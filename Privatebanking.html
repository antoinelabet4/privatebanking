            <div key={i} style={{ display:"flex", gap:10, marginBottom:10, padding:"8px 10px", background:"rgba(224,85,85,0.05)", border:"1px solid rgba(224,85,85,0.1)", borderRadius:7 }}>
              <span style={{ fontSize:16, flexShrink:0 }}>{r.icon}</span>
              <div>
                <div style={{ fontSize:11, color:"#F5F7FA", fontWeight:"bold", marginBottom:2 }}>{r.title}</div>
                <div style={{ fontSize:10, color:"#888" }}>{r.desc}</div>
              </div>
            </div>
          ); })}
        </div>
        <div style={{ background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:10, padding:"16px 20px" }}>
          <div style={{ fontSize:10, color:"#4a9e6b", fontWeight:"bold", letterSpacing:"0.06em", marginBottom:12 }}>✅ POINTS FORTS</div>
          {strengths.length === 0 ? (
            <div style={{ fontSize:11, color:"#555", fontStyle:"italic" }}>Complétez vos onglets pour voir l'analyse</div>
          ) : strengths.map(function(s,i) { return (
            <div key={i} style={{ display:"flex", gap:10, marginBottom:10, padding:"8px 10px", background:"rgba(74,158,107,0.05)", border:"1px solid rgba(74,158,107,0.1)", borderRadius:7 }}>
              <span style={{ fontSize:16, flexShrink:0 }}>{s.icon}</span>
              <div>
                <div style={{ fontSize:11, color:"#F5F7FA", fontWeight:"bold", marginBottom:2 }}>{s.title}</div>
                <div style={{ fontSize:10, color:"#888" }}>{s.desc}</div>
              </div>
            </div>
          ); })}
        </div>
	      </div>
	      <div className="client-report" style={{ background:"linear-gradient(135deg,rgba(0,225,220,0.06),rgba(255,255,255,0.02))", border:"1px solid rgba(0,225,220,0.2)", borderRadius:10, padding:"18px 20px", marginBottom:16 }}>
	        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
	          <div>
		            <div style={{ fontSize:12, color:"#00E1DC", fontWeight:"bold", letterSpacing:"0.06em" }}>{tr(lang, "clientReadyReport")}</div>
		            <div style={{ fontSize:10, color:"#666", marginTop:3 }}>{tr(lang, "clientReadySub")}</div>
	          </div>
		          <div style={{ fontSize:10, color:"#777" }}>{reportMode === "client" ? tr(lang, "clientPresentation") : tr(lang, "advisorPresentation")}</div>
	        </div>
	        <div style={{ display:"grid", gridTemplateColumns: reportMode === "client" ? "1fr 1fr" : "repeat(4,1fr)", gap:10 }}>
	          {[
		            { t:tr(lang, "executiveSummary"), v: lang === "en" ? `Consolidated net worth of ${fmtMoney(totalPatrimoine)} across ${modules.length} main pockets.` : `Patrimoine net consolidé de ${fmtMoney(totalPatrimoine)} réparti sur ${modules.length} poches principales.`, c:"#00E1DC" },
		            { t:tr(lang, "assetAllocation"), v:assetClasses.slice(0,3).map(a=>`${a.label} ${safePct(a.value,totalPatrimoine).toFixed(0)}%`).join(" · ") || (lang === "en" ? "Allocation to be completed." : "Allocation à compléter."), c:"#7a9ec9" },
		            { t:tr(lang, "riskOverview"), v:risks[0]?.desc || (lang === "en" ? "No major risk detected with current data." : "Aucun risque majeur détecté avec les données actuelles."), c:risks.length ? "#e8a055" : "#4a9e6b" },
		            { t:tr(lang, "recommendedActions"), v:risks.length ? (lang === "en" ? "Reduce concentrations, document currencies and complete missing exposures." : "Réduire les concentrations, documenter les devises et compléter les expositions manquantes.") : (lang === "en" ? "Keep monitoring discipline and enrich the monthly history." : "Maintenir la discipline de suivi et enrichir l'historique mensuel."), c:"#4a9e6b" },
	          ].map(x => <div key={x.t} style={{ background:"rgba(0,0,0,0.22)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:8, padding:"12px 14px" }}><div style={{ fontSize:9, color:x.c, letterSpacing:"0.06em", fontWeight:"bold", marginBottom:7 }}>{x.t}</div><div style={{ fontSize:11, color:"#bbb", lineHeight:1.55 }}>{x.v}</div></div>)}
	        </div>
	        {reportMode === "advisor" && (
	          <div style={{ marginTop:12, display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
	            <div style={{ background:"rgba(0,0,0,0.18)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:8, padding:"12px 14px" }}>
		              <div style={{ fontSize:9, color:"#00E1DC", letterSpacing:"0.06em", fontWeight:"bold", marginBottom:7 }}>{tr(lang, "marketCommentary")}</div>
		              <div style={{ fontSize:11, color:"#aaa", lineHeight:1.55 }}>{lang === "en" ? "Web search remains available in PEA/CTO/Insurance modules. If market data is unavailable, reporting uses local prices and explicitly flags the lack of real-time data." : "La recherche web reste disponible dans les modules PEA/CTO/AV. Si une donnée de marché est indisponible, le reporting s'appuie sur les prix locaux et signale l'absence de donnée temps réel."}</div>
	            </div>
	            <div style={{ background:"rgba(0,0,0,0.18)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:8, padding:"12px 14px" }}>
		              <div style={{ fontSize:9, color:"#00E1DC", letterSpacing:"0.06em", fontWeight:"bold", marginBottom:7 }}>{tr(lang, "diversificationAnalysis")}</div>
		              <div style={{ fontSize:11, color:"#aaa", lineHeight:1.55 }}>{lang === "en" ? `${cats.length} asset classes tracked, ${exposure.geography.length} geographies and ${exposure.currency.length} consolidated currencies.` : `${cats.length} classes d'actifs suivies, ${exposure.geography.length} zones géographiques et ${exposure.currency.length} devises consolidées.`}</div>
	            </div>
	          </div>
	        )}
	      </div>

		      {/* ── Analyse IA ── */}
		      {reportMode === "advisor" && (
		        <div style={{ background:"rgba(255,255,255,0.02)", border:"1px solid rgba(0,225,220,0.2)", borderRadius:10, padding:"20px", marginBottom:16 }}>
		          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom: analysis ? 16 : 0 }}>
		            <div>
		              <div style={{ fontSize:12, color:"#00E1DC", fontWeight:"bold", letterSpacing:"0.06em" }}>🤖 ANALYSE PATRIMONIALE IA</div>
		              <div style={{ fontSize:10, color:"#555", marginTop:3 }}>Analyse approfondie par un conseiller IA d'élite (Goldman Sachs · Bridgewater · BlackRock)</div>
		            </div>
		            <button onClick={generateAnalysis} disabled={analyzing}
		              style={{ background: analyzing ? "rgba(255,255,255,0.05)" : "linear-gradient(135deg,rgba(0,225,220,0.2),rgba(0,225,220,0.1))", border:"1px solid rgba(0,225,220,0.4)", borderRadius:9, padding:"10px 20px", cursor: analyzing ? "default" : "pointer", color: analyzing ? "#555" : "#00E1DC", fontSize:12, fontFamily:"inherit", display:"flex", alignItems:"center", gap:8, transition:"all 0.2s" }}>
		              {analyzing ? (
		                <>
		                  <span style={{ display:"inline-block", width:10, height:10, border:"2px solid rgba(0,225,220,0.3)", borderTopColor:"#00E1DC", borderRadius:"50%", animation:"spin 0.8s linear infinite" }} />
		                  Analyse en cours…
		                </>
		              ) : "✨ Analyser mon patrimoine"}
		            </button>
		          </div>
		          {analysis && (
		            <div style={{ borderTop:"1px solid rgba(255,255,255,0.07)", paddingTop:16 }}>
		              <div style={{ fontSize:12, color:"#ddd", lineHeight:1.8, whiteSpace:"pre-wrap" }}>{analysis}</div>
		            </div>
		          )}
		        </div>
		      )}

    </div>
  );
}


// ──────────────────────────────────────────────────
// REVENUS MODULE
// ──────────────────────────────────────────────────

const REVENU_CATS = [
  { id: "salaire",    label: "💼 Revenus d'activité",       color: "#4a9e6b" },
  { id: "dividendes", label: "📈 Dividendes & Plus-values",  color: "#00E1DC" },
  { id: "immobilier", label: "🏠 Revenus immobiliers",       color: "#a0c4ff" },
  { id: "interets",   label: "🏦 Intérêts & Livrets",        color: "#7a9ec9" },
  { id: "retraite",   label: "🎯 Retraite & Pensions",       color: "#8b9e4a" },
  { id: "autres",     label: "✨ Autres revenus",             color: "#9e6b4a" },
];

const REVENU_SOUS_TYPES = {
  salaire:    ["Salaire net", "Salaire brut", "Prime / Bonus", "Freelance / BNC", "Intéressement / Participation", "RSU / Stock-options"],
  dividendes: ["Dividendes PEA", "Dividendes CTO", "Plus-value PEA", "Plus-value CTO", "ETF distribution"],
  immobilier: ["Loyers nus (foncier)", "Loyers meublés (LMNP)", "Revenus SCPI", "Plus-value immobilière", "Revenus parking / cave"],
  interets:   ["Livret A", "LEP", "LDDS", "Compte à terme", "Fonds euros AV", "Obligations / Coupons"],
  retraite:   ["Retraite de base (SS)", "Retraite complémentaire", "Pension d'invalidité", "Allocations chômage", "Pension alimentaire"],
  autres:     ["Héritage / Donation", "Cession d'entreprise", "Rachat AV", "Droits d'auteur / Royalties", "Revenu exceptionnel"],
};

const REVENU_FREQS = [
  { id: "mensuel",     label: "Mensuel",     mult: 12 },
  { id: "trimestriel", label: "Trimestriel", mult: 4  },
  { id: "annuel",      label: "Annuel",      mult: 1  },
  { id: "ponctuel",    label: "Ponctuel",    mult: 0  },
];

const BLANK_REVENU = { id: 0, label: "", categorie: "salaire", sousType: "Salaire net", montant: "", frequence: "mensuel", isNet: true, notes: "" };

function RevenusModule({ patrimoine, onTotalChange, immoBiens, reportMode = "advisor", lang = "fr" }) {
  const [lignes, setLignes] = useState(() => {
    try { const s = localStorage.getItem("mpb_revenus"); if (s) return JSON.parse(s); } catch {}
    return [];
  });
  const [form, setForm] = useState(null);
  const onTotalRef = useRef(onTotalChange);
  onTotalRef.current = onTotalChange;

  // ── Suggestions auto depuis autres modules ──
  const [dismissedSugs, setDismissedSugs] = useState(() => {
    try { const s = localStorage.getItem("mpb_revenus_dismissed"); if (s) return JSON.parse(s); } catch {}
    return [];
  });

  const suggestions = React.useMemo(() => {
    const sugs = [];
	    const peaLines = readJson("pea_lines", []);
	    const ctoLines = readJson("cto_lines", []);
	    const avLines  = readJson("av_lines", []);

    const val = (l) => getLineCurrentValue(l);

    // PEA — lignes catégorie Dividendes uniquement
    const peaDiv = peaLines.filter(l => l.categorie === "Dividendes");
    if (peaDiv.length > 0) {
      const total = peaDiv.reduce((s, l) => s + val(l), 0);
      sugs.push({ key: "pea_div", label: "Dividendes PEA", categorie: "dividendes", sousType: "Dividendes PEA",
        montant: String(Math.round(total * 0.03 / 12)), frequence: "mensuel", isNet: false,
        badge: "PEA", badgeColor: "#4a9e6b",
        notes: "Estimé 3% rendement · " + Math.round(total).toLocaleString("fr-FR") + " € investi" });
    }

    // CTO — actions individuelles (dividendes estimés)
    const ctoStocks = ctoLines.filter(l => ["Action Europe","Action USA","Dividendes"].includes(l.categorie));
    if (ctoStocks.length > 0) {
      const total = ctoStocks.reduce((s, l) => s + val(l), 0);
      sugs.push({ key: "cto_div", label: "Dividendes CTO", categorie: "dividendes", sousType: "Dividendes CTO",
        montant: String(Math.round(total * 0.02 / 12)), frequence: "mensuel", isNet: false,
        badge: "CTO", badgeColor: "#a8c4e8",
        notes: "Estimé 2% yield · " + Math.round(total).toLocaleString("fr-FR") + " € actions" });
    }

    // AV — fonds euros (intérêts)
    const avEuros = avLines.filter(l => l.categorie === "Fonds Euros");
    if (avEuros.length > 0) {
      const total = avEuros.reduce((s, l) => s + val(l), 0);
      sugs.push({ key: "av_euros", label: "Intérêts Fonds Euros AV", categorie: "interets", sousType: "Fonds euros AV",
        montant: String(Math.round(total * 0.025)), frequence: "annuel", isNet: false,
        badge: "AV", badgeColor: "#7a9ec9",
        notes: "Estimé 2,5% · " + Math.round(total).toLocaleString("fr-FR") + " € fonds euros" });
    }

    // AV — UC Actions (dividendes distribués, estimé faible)
    const avUC = avLines.filter(l => l.categorie === "UC Actions");
    if (avUC.length > 0) {
      const total = avUC.reduce((s, l) => s + val(l), 0);
      sugs.push({ key: "av_uc", label: "Revenus UC Actions AV", categorie: "dividendes", sousType: "ETF distribution",
        montant: String(Math.round(total * 0.015)), frequence: "annuel", isNet: false,
        badge: "AV", badgeColor: "#7a9ec9",
        notes: "Estimé 1,5% · " + Math.round(total).toLocaleString("fr-FR") + " € UC actions" });
    }

    // Immo — loyers par bien
    const biens = immoBiens || [];
    biens.filter(b => parseFloat(b.loyerMensuelHC) > 0).forEach(b => {
      const loyer = parseFloat(b.loyerMensuelHC) || 0;
      const charges = parseFloat(b.chargesLoc) || 0;
      const isLMNP = b.regimeFiscal === "lmnp" || b.regimeFiscal === "bic";
      const adresse = [b.adresse, b.ville].filter(Boolean).join(", ") || "Bien immobilier";
      sugs.push({ key: "immo_" + b.id, label: "Loyers · " + adresse, categorie: "immobilier",
        sousType: isLMNP ? "Loyers meublés (LMNP)" : "Loyers nus (foncier)",
        montant: String(Math.round(loyer + charges)), frequence: "mensuel", isNet: false,
        badge: "Immo", badgeColor: "#a0c4ff",
        notes: b.ville || "" });
    });

    // Livrets — si pas encore de revenus intérêts renseignés, suggérer
    const hasInterets = lignes.some(l => l.categorie === "interets" && l.sousType !== "Fonds euros AV");
    if (!hasInterets) {
      sugs.push({ key: "livret_a", label: "Livret A", categorie: "interets", sousType: "Livret A",
        montant: "", frequence: "annuel", isNet: true,
        badge: "Banque", badgeColor: "#8b9e4a",
        notes: "Plafond 22 950 € · taux 2,4%" });
    }

    // Filter out already dismissed and already added
    return sugs.filter(s =>
      !dismissedSugs.includes(s.key) &&
      !lignes.some(l => l.sousType === s.sousType && l.label.includes(s.label.split(" · ")[0]))
    );
  }, [immoBiens, lignes, dismissedSugs]);

  function acceptSuggestion(sug) {
    const { key, badge, badgeColor, ...ligne } = sug;
    setLignes(prev => [...prev, { ...ligne, id: Date.now() }]);
  }

  function dismissSuggestion(key) {
    const next = [...dismissedSugs, key];
    setDismissedSugs(next);
    localStorage.setItem("mpb_revenus_dismissed", JSON.stringify(next));
  }

  useEffect(() => { localStorage.setItem("mpb_revenus", JSON.stringify(lignes)); }, [lignes]);

  const getAnnuel = (l) => {
    const mult = REVENU_FREQS.find(f => f.id === l.frequence)?.mult || 0;
    return (parseFloat(l.montant) || 0) * mult;
  };

  const totalAnnuel    = lignes.reduce((s, l) => s + getAnnuel(l), 0);
  const totalMensuel   = totalAnnuel / 12;
  const revenusPassifs = lignes.filter(l => l.categorie !== "salaire").reduce((s, l) => s + getAnnuel(l), 0);
  const tauxRendement  = patrimoine > 0 ? (revenusPassifs / patrimoine) * 100 : 0;
  const incomeAdvisorOpportunities = buildIncomeAdvisorOpportunities(lignes, patrimoine, lang);

  useEffect(() => { onTotalRef.current(totalAnnuel); }, [totalAnnuel]);

  function save(ligne) {
    if (ligne.id) { setLignes(prev => prev.map(l => l.id === ligne.id ? ligne : l)); }
    else          { setLignes(prev => [...prev, { ...ligne, id: Date.now() }]); }
    setForm(null);
  }

  const allGrouped = REVENU_CATS.map(cat => ({
    ...cat,
    total: lignes.filter(l => l.categorie === cat.id).reduce((s, l) => s + getAnnuel(l), 0),
  })).filter(g => g.total > 0);

  const inputStyle = { width: "100%", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(0,225,220,0.2)", borderRadius: 6, padding: "6px 10px", color: "#F5F7FA", fontSize: 12, fontFamily: "inherit" };
  const selectStyle = { width: "100%", background: "#1a1a2e", border: "1px solid rgba(0,225,220,0.2)", borderRadius: 6, padding: "6px 10px", color: "#F5F7FA", fontSize: 12, fontFamily: "inherit" };
  const labelStyle  = { fontSize: 10, color: "#888", marginBottom: 4 };

  return (
    <div style={{ padding: "20px 24px", maxWidth: 880, margin: "0 auto" }}>

      {/* ── Stats ── */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 12, marginBottom: 24 }}>
        {[
          { label: "REVENU ANNUEL NET",    value: Math.round(totalAnnuel).toLocaleString("fr-FR") + " €",  color: "#00E1DC" },
          { label: "REVENU MENSUEL NET",   value: Math.round(totalMensuel).toLocaleString("fr-FR") + " €", color: "#4a9e6b" },
          { label: "REVENUS PASSIFS / AN", value: Math.round(revenusPassifs).toLocaleString("fr-FR") + " €", color: "#7a9ec9" },
          { label: "TAUX DE RENDEMENT",    value: tauxRendement.toFixed(2) + " %",                          color: "#a0c4ff" },
        ].map(s => (
          <div key={s.label} style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(0,225,220,0.12)", borderRadius: 10, padding: "14px 16px" }}>
            <div style={{ fontSize: 9, color: "#666", letterSpacing: "0.08em", marginBottom: 6 }}>{s.label}</div>
            <div style={{ fontSize: 18, fontWeight: "bold", color: s.color }}>{s.value}</div>
          </div>
        ))}
      </div>

      {reportMode === "advisor" && (
        <AdvisorOpportunityPanel opportunities={incomeAdvisorOpportunities} lang={lang} />
      )}

      {/* ── Breakdown bar ── */}
      {totalAnnuel > 0 && allGrouped.length > 0 && (
        <div style={{ marginBottom: 20, background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 10, padding: "14px 16px" }}>
          <div style={{ fontSize: 10, color: "#888", letterSpacing: "0.06em", marginBottom: 10 }}>RÉPARTITION DES REVENUS</div>
          <div style={{ height: 8, borderRadius: 4, overflow: "hidden", display: "flex", marginBottom: 10 }}>
            {allGrouped.map(g => (
              <div key={g.id} style={{ width: ((g.total / totalAnnuel) * 100) + "%", background: g.color, transition: "width 0.4s" }}
                title={g.label + ": " + Math.round(g.total).toLocaleString("fr-FR") + " €/an"} />
            ))}
          </div>
          <div style={{ display: "flex", gap: 14, flexWrap: "wrap" }}>
            {allGrouped.map(g => (
              <div key={g.id} style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 10, color: "#888" }}>
                <div style={{ width: 8, height: 8, borderRadius: 2, background: g.color }} />
                {g.label.split(" ").slice(1).join(" ")} — {((g.total / totalAnnuel) * 100).toFixed(1)}%
                <span style={{ color: "#555" }}>({Math.round(g.total).toLocaleString("fr-FR")} €)</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── Suggestions ── */}
      {suggestions.length > 0 && (
        <div style={{ background: "rgba(0,225,220,0.05)", border: "1px solid rgba(0,225,220,0.2)", borderRadius: 10, padding: "14px 16px", marginBottom: 18 }}>
          <div style={{ fontSize: 10, color: "#00E1DC", letterSpacing: "0.08em", marginBottom: 12, display: "flex", alignItems: "center", gap: 6 }}>
            <span>✨</span>
            <span>SUGGESTIONS AUTOMATIQUES</span>
            <span style={{ color: "#555", fontWeight: "normal" }}>— pré-remplies depuis vos autres onglets</span>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
            {suggestions.map(sug => (
              <div key={sug.key} style={{ background: "rgba(0,0,0,0.3)", borderRadius: 8, padding: "9px 12px", display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ background: sug.badgeColor + "22", color: sug.badgeColor, fontSize: 9, padding: "2px 7px", borderRadius: 10, fontWeight: "bold", letterSpacing: "0.05em", flexShrink: 0 }}>{sug.badge}</span>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 12, color: "#F5F7FA" }}>{sug.label}</div>
                  <div style={{ fontSize: 10, color: "#666" }}>{sug.sousType}{sug.notes ? " · " + sug.notes : ""}</div>
                </div>
                {sug.montant && (
                  <div style={{ fontSize: 12, color: "#aaa", minWidth: 100, textAlign: "right" }}>
                    {parseFloat(sug.montant).toLocaleString("fr-FR")} € / {sug.frequence === "mensuel" ? "mois" : sug.frequence === "annuel" ? "an" : sug.frequence}
                  </div>
                )}
                <button onClick={() => acceptSuggestion(sug)}
                  style={{ background: "rgba(74,158,107,0.15)", border: "1px solid rgba(74,158,107,0.4)", borderRadius: 6, padding: "5px 12px", cursor: "pointer", color: "#4a9e6b", fontSize: 11, fontFamily: "inherit", flexShrink: 0 }}>
                  ✓ Ajouter
                </button>
                <button onClick={() => dismissSuggestion(sug.key)}
                  style={{ background: "none", border: "none", cursor: "pointer", color: "#444", fontSize: 14, padding: "2px 4px", lineHeight: 1 }}>
                  ✕
                </button>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── Header ── */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
        <div style={{ fontSize: 12, color: "#00E1DC", fontWeight: "bold", letterSpacing: "0.06em" }}>MES SOURCES DE REVENUS</div>
        <button onClick={() => setForm({ ...BLANK_REVENU })}
          style={{ background: "rgba(0,225,220,0.12)", border: "1px solid rgba(0,225,220,0.3)", borderRadius: 8, padding: "7px 14px", cursor: "pointer", color: "#00E1DC", fontSize: 12, fontFamily: "inherit" }}>
          + Ajouter un revenu
        </button>
      </div>

      {/* ── Form ── */}
      {form && (
        <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(0,225,220,0.2)", borderRadius: 10, padding: 16, marginBottom: 16 }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 10 }}>
            <div>
              <div style={labelStyle}>LIBELLÉ</div>
              <input value={form.label} onChange={e => setForm(f => ({ ...f, label: e.target.value }))}
                placeholder="Ex: Salaire principal" style={inputStyle} />
            </div>
            <div>
              <div style={labelStyle}>CATÉGORIE</div>
              <select value={form.categorie}
                onChange={e => setForm(f => ({ ...f, categorie: e.target.value, sousType: REVENU_SOUS_TYPES[e.target.value][0] }))}
                style={selectStyle}>
                {REVENU_CATS.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}
              </select>
            </div>
            <div>
              <div style={labelStyle}>TYPE PRÉCIS</div>
              <select value={form.sousType} onChange={e => setForm(f => ({ ...f, sousType: e.target.value }))} style={selectStyle}>
                {(REVENU_SOUS_TYPES[form.categorie] || []).map(t => <option key={t} value={t}>{t}</option>)}
              </select>
            </div>
            <div>
              <div style={labelStyle}>MONTANT (€)</div>
              <input type="number" value={form.montant} onChange={e => setForm(f => ({ ...f, montant: e.target.value }))}
                placeholder="0" style={inputStyle} />
            </div>
            <div>
              <div style={labelStyle}>FRÉQUENCE</div>
              <select value={form.frequence} onChange={e => setForm(f => ({ ...f, frequence: e.target.value }))} style={selectStyle}>
                {REVENU_FREQS.map(fr => <option key={fr.id} value={fr.id}>{fr.label}</option>)}
              </select>
            </div>
            <div style={{ display: "flex", flexDirection: "column", justifyContent: "flex-end", paddingBottom: 2 }}>
              <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", fontSize: 12, color: "#aaa" }}>
                <input type="checkbox" checked={form.isNet} onChange={e => setForm(f => ({ ...f, isNet: e.target.checked }))}
                  style={{ accentColor: "#00E1DC" }} />
                Montant net (après impôts)
              </label>
            </div>
          </div>
          <div style={{ marginBottom: 12 }}>
            <div style={labelStyle}>NOTES (optionnel)</div>
            <input value={form.notes} onChange={e => setForm(f => ({ ...f, notes: e.target.value }))}
              placeholder="Ex: CDI, après PAS, revalorisé en mars…" style={inputStyle} />
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => save(form)} disabled={!form.label || !form.montant}
              style={{ background: (form.label && form.montant) ? "rgba(0,225,220,0.15)" : "rgba(255,255,255,0.04)", border: "1px solid rgba(0,225,220,0.3)", borderRadius: 7, padding: "7px 16px", cursor: (form.label && form.montant) ? "pointer" : "default", color: (form.label && form.montant) ? "#00E1DC" : "#555", fontSize: 12, fontFamily: "inherit" }}>
              {form.id ? "✓ Modifier" : "✓ Ajouter"}
            </button>
            <button onClick={() => setForm(null)}
              style={{ background: "none", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 7, padding: "7px 14px", cursor: "pointer", color: "#666", fontSize: 12, fontFamily: "inherit" }}>
              Annuler
            </button>
          </div>
        </div>
      )}

      {/* ── Empty state ── */}
      {lignes.length === 0 && !form && (
        <div style={{ textAlign: "center", padding: "60px 20px", color: "#555" }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>💰</div>
          <div style={{ fontSize: 14, marginBottom: 6, color: "#777" }}>Aucune source de revenu renseignée</div>
          <div style={{ fontSize: 12, color: "#444" }}>Ajoutez vos revenus pour visualiser votre taux d'épargne et le rendement de votre capital</div>
        </div>
      )}

      {/* ── Grouped list ── */}
      {REVENU_CATS.map(cat => {
        const catLignes = lignes.filter(l => l.categorie === cat.id);
        if (catLignes.length === 0) return null;
        const catTotal = catLignes.reduce((s, l) => s + getAnnuel(l), 0);
        return (
          <div key={cat.id} style={{ marginBottom: 18 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8, padding: "0 4px" }}>
              <div style={{ fontSize: 11, color: cat.color, fontWeight: "bold", letterSpacing: "0.05em" }}>{cat.label}</div>
              <div style={{ fontSize: 12, color: cat.color }}>{Math.round(catTotal).toLocaleString("fr-FR")} €/an</div>
            </div>
            {catLignes.map(l => {
              const annuel  = getAnnuel(l);
              const mensuel = annuel / 12;
              const freqLabel = REVENU_FREQS.find(f => f.id === l.frequence)?.label?.toLowerCase() || "";
              return (
                <div key={l.id} style={{ background: "rgba(255,255,255,0.025)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 8, padding: "10px 14px", marginBottom: 6, display: "flex", alignItems: "center", gap: 12 }}>
                  <div style={{ width: 3, height: 34, borderRadius: 2, background: cat.color, flexShrink: 0 }} />
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 13, color: "#F5F7FA", marginBottom: 2 }}>{l.label}</div>
                    <div style={{ fontSize: 10, color: "#666" }}>{l.sousType} · {l.isNet ? "Net" : "Brut"}{l.notes ? " · " + l.notes : ""}</div>
                  </div>
                  <div style={{ textAlign: "right", minWidth: 150 }}>
                    <div style={{ fontSize: 13, color: "#F5F7FA" }}>{parseFloat(l.montant).toLocaleString("fr-FR")} € / {freqLabel}</div>
                    {l.frequence !== "annuel" && l.frequence !== "ponctuel" && (
                      <div style={{ fontSize: 10, color: "#666" }}>{Math.round(mensuel).toLocaleString("fr-FR")} €/mois · {Math.round(annuel).toLocaleString("fr-FR")} €/an</div>
                    )}
                  </div>
                  <div style={{ display: "flex", gap: 6 }}>
                    <button onClick={() => setForm({ ...l })}
                      style={{ background: "none", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 5, padding: "4px 8px", cursor: "pointer", color: "#888", fontSize: 11, fontFamily: "inherit" }}>✏️</button>
                    <button onClick={() => setLignes(prev => prev.filter(x => x.id !== l.id))}
                      style={{ background: "none", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 5, padding: "4px 8px", cursor: "pointer", color: "#e05555", fontSize: 11, fontFamily: "inherit" }}>✕</button>
                  </div>
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}


// ══════════════════════════════════════════
// FISCALITE MODULE
// ══════════════════════════════════════════
function FiscaliteModule({ immoBiens, peaTotal, ctoTotal, avTotal, reportMode = "advisor", lang = "fr" }) {
  const [config, setConfig] = React.useState(() => {
    try { const s = localStorage.getItem("mpb_fiscal_cfg"); if (s) return JSON.parse(s); } catch {}
    return { tmi: 30, situation: "celibataire", enfants: 0, optionBareme: false };
  });
  const setConf = (k, v) => setConfig(c => { const n = { ...c, [k]: v }; localStorage.setItem("mpb_fiscal_cfg", JSON.stringify(n)); return n; });

  const revenus  = React.useMemo(() => { try { return JSON.parse(localStorage.getItem("mpb_revenus") || "[]"); } catch { return []; } }, []);
  const peaLines = React.useMemo(() => { try { return JSON.parse(localStorage.getItem("pea_lines")   || "[]"); } catch { return []; } }, []);
  const ctoLines = React.useMemo(() => { try { return JSON.parse(localStorage.getItem("cto_lines")   || "[]"); } catch { return []; } }, []);
  const avLines  = React.useMemo(() => { try { return JSON.parse(localStorage.getItem("av_lines")    || "[]"); } catch { return []; } }, []);

  const ann = (l) => { const m = { mensuel:12, trimestriel:4, annuel:1, ponctuel:0 }[l.frequence] || 0; return (parseFloat(l.montant)||0)*m; };
  const t = config.tmi / 100;
  const abattAV = (config.situation === "marie" || config.situation === "pacs") ? 9200 : 4600;
  const enfants = config.enfants || 0;
  const partsBase = (config.situation === "marie" || config.situation === "pacs") ? 2 : 1;
  const partsSup = enfants === 0 ? 0 : enfants === 1 ? 0.5 : enfants === 2 ? 1 : 1 + (enfants - 2);
  const totalParts = partsBase + partsSup;

  // ── Revenus d'activité ──
  const revAct = revenus.filter(r => r.categorie === "salaire").reduce((s,r) => s+ann(r), 0);
  const abPro  = Math.min(14171, Math.max(495, revAct * 0.10));
  const taxAct = Math.max(0, revAct - abPro) * t;

  // ── Retraites ──
  const revRet  = revenus.filter(r => r.categorie === "retraite").reduce((s,r) => s+ann(r), 0);
  const taxRet  = Math.max(0, revRet - Math.min(4321, Math.max(422, revRet*0.10))) * t;

  // ── Dividendes CTO ──
  const divCTO = revenus.filter(r => r.sousType === "Dividendes CTO").reduce((s,r) => s+ann(r), 0);
  const taxDivPFU    = divCTO * 0.30;
  const taxDivBareme = divCTO * 0.60 * t + divCTO * 0.172;
  const taxDivCTO    = (config.optionBareme && taxDivBareme < taxDivPFU) ? taxDivBareme : taxDivPFU;

  // ── Dividendes PEA ──
  const divPEA = revenus.filter(r => r.sousType === "Dividendes PEA").reduce((s,r) => s+ann(r), 0);
  const taxDivPEA = divPEA * 0.172; // PS uniquement après 5 ans

  // ── Loyers nus (micro-foncier 30%) ──
  const loyNus  = revenus.filter(r => r.sousType === "Loyers nus (foncier)").reduce((s,r) => s+ann(r), 0);
  const taxLoyer = loyNus * 0.70 * (t + 0.172);

  // ── LMNP (micro-BIC 50%) ──
  const loyLMNP  = revenus.filter(r => r.sousType === "Loyers meublés (LMNP)").reduce((s,r) => s+ann(r), 0);
  const taxLMNP  = loyLMNP * 0.50 * (t + 0.172);

  // ── Intérêts imposables (hors livrets réglementés) ──
  const exo = ["Livret A","LEP","LDDS"];
  const intImp  = revenus.filter(r => r.categorie === "interets" && !exo.includes(r.sousType)).reduce((s,r) => s+ann(r), 0);
  const taxInt  = intImp * 0.30;

  // ── Plus-values latentes PEA (indicatif) ──
  const pvPEA   = peaLines.reduce((s,l) => s + getLineLatentGain(l), 0);
  const taxPVPEA = pvPEA * 0.172;

  // ── Plus-values latentes CTO (indicatif) ──
  const pvCTO   = ctoLines.reduce((s,l) => s + getLineLatentGain(l), 0);
  const taxPVCTO = pvCTO * 0.30;

  // ── Gains latents AV (indicatif) ──
  const pvAV    = avLines.reduce((s,l) => s + getLineLatentGain(l), 0);
  const taxPVAV = Math.max(0, pvAV - abattAV) * (0.075 + 0.172);

  // ── IFI ──
  const immoVal  = immoBiens.reduce((s,b) => s + getBienValeur(b), 0);
  const immoDet  = immoBiens.reduce((s,b) => s + getBienDetteRestante(b), 0);
  const immoBase = Math.max(0, immoVal - immoDet);
  let ifi = 0;
  if (immoBase > 1300000) {
    if      (immoBase <= 2570000)  ifi = 2500  + (immoBase-1300000)*0.007;
    else if (immoBase <= 5000000)  ifi = 11390 + (immoBase-2570000)*0.010;
    else if (immoBase <= 10000000) ifi = 35690 + (immoBase-5000000)*0.0125;
    else                           ifi = 98190 + (immoBase-10000000)*0.015;
    ifi += (Math.min(immoBase,1300000) - 800000) * 0.005;
  }

  // ── Totaux ──
  const totalRevenus = revenus.reduce((s,r) => s+ann(r), 0);
  const taxCourante  = taxAct + taxRet + taxDivCTO + taxDivPEA + taxLoyer + taxLMNP + taxInt + ifi;
  const taxLatente   = taxPVPEA + taxPVCTO + taxPVAV;
  const tauxPression = totalRevenus > 0 ? (taxCourante / totalRevenus) * 100 : 0;
  const fiscalAdvisorOpportunities = buildFiscalAdvisorOpportunities({ immoBiens, peaTotal, ctoTotal, avTotal }, lang);

  const fmt = (n) => Math.round(n).toLocaleString("fr-FR");
  const pct = (n) => n.toFixed(1) + "%";

  const ROW = ({ label, base, taux, tax, color, note, bold }) => tax <= 0 ? null : (
    <div style={{ display:"flex", alignItems:"center", gap:8, padding:"9px 14px", borderBottom:"1px solid rgba(255,255,255,0.04)" }}>
      <div style={{ width:3, alignSelf:"stretch", borderRadius:2, background: color, flexShrink:0 }} />
      <div style={{ flex:1 }}>
        <div style={{ fontSize:12, color: bold ? "#F5F7FA" : "#ccc", fontWeight: bold ? "bold" : "normal" }}>{label}</div>
        {note && <div style={{ fontSize:10, color:"#555", marginTop:1 }}>{note}</div>}
      </div>
      {base > 0 && <div style={{ fontSize:11, color:"#666", minWidth:100, textAlign:"right" }}>{fmt(base)} € de base</div>}
      <div style={{ fontSize:11, color:"#888", minWidth:70, textAlign:"right" }}>{taux}</div>
      <div style={{ fontSize:13, color: color, fontWeight:"bold", minWidth:90, textAlign:"right" }}>{fmt(tax)} €</div>
    </div>
  );

  return (
    <div style={{ padding:"20px 24px", maxWidth:920, margin:"0 auto" }}>

      {/* ── Config ── */}
      <div style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(0,225,220,0.2)", borderRadius:10, padding:"16px 20px", marginBottom:20, display:"flex", gap:24, flexWrap:"wrap", alignItems:"flex-end" }}>
        <div>
          <div style={{ fontSize:10, color:"#888", marginBottom:5, letterSpacing:"0.06em" }}>TRANCHE MARGINALE D'IMPOSITION</div>
          <div style={{ display:"flex", gap:6 }}>
            {[0,11,30,41,45].map(v => (
              <button key={v} onClick={() => setConf("tmi", v)}
                style={{ padding:"5px 12px", borderRadius:6, border: config.tmi===v ? "1px solid #00E1DC" : "1px solid rgba(255,255,255,0.1)", background: config.tmi===v ? "rgba(0,225,220,0.15)" : "none", color: config.tmi===v ? "#00E1DC" : "#666", fontSize:12, cursor:"pointer", fontFamily:"inherit" }}>
                {v}%
              </button>
            ))}
          </div>
        </div>
        <div>
          <div style={{ fontSize:10, color:"#888", marginBottom:5, letterSpacing:"0.06em" }}>SITUATION</div>
          <div style={{ display:"flex", gap:6 }}>
            {[["celibataire","Célibataire"],["marie","Marié·e / Pacsé·e"]].map(([v,l]) => (
              <button key={v} onClick={() => setConf("situation", v)}
                style={{ padding:"5px 12px", borderRadius:6, border: config.situation===v ? "1px solid #00E1DC" : "1px solid rgba(255,255,255,0.1)", background: config.situation===v ? "rgba(0,225,220,0.15)" : "none", color: config.situation===v ? "#00E1DC" : "#666", fontSize:12, cursor:"pointer", fontFamily:"inherit" }}>
                {l}
              </button>
            ))}
          </div>
        </div>
        <div>
          <div style={{ fontSize:10, color:"#888", marginBottom:5, letterSpacing:"0.06em" }}>ENFANTS À CHARGE</div>
          <div style={{ display:"flex", gap:6 }}>
            {[0,1,2,3,4,5].map(v => (
              <button key={v} onClick={() => setConf("enfants", v)}
                style={{ padding:"5px 10px", borderRadius:6, border: config.enfants===v ? "1px solid #00E1DC" : "1px solid rgba(255,255,255,0.1)", background: config.enfants===v ? "rgba(0,225,220,0.15)" : "none", color: config.enfants===v ? "#00E1DC" : "#666", fontSize:12, cursor:"pointer", fontFamily:"inherit" }}>
                {v === 5 ? "5+" : v}
              </button>
            ))}
          </div>
          <div style={{ fontSize:10, color:"#555", marginTop:5 }}>Quotient familial : <strong style={{ color:"#888" }}>{totalParts} parts</strong></div>
        </div>
        <div>
          <div style={{ fontSize:10, color:"#888", marginBottom:5, letterSpacing:"0.06em" }}>OPTION BARÈME (CTO)</div>
          <button onClick={() => setConf("optionBareme", !config.optionBareme)}
            style={{ padding:"5px 12px", borderRadius:6, border: config.optionBareme ? "1px solid #4a9e6b" : "1px solid rgba(255,255,255,0.1)", background: config.optionBareme ? "rgba(74,158,107,0.15)" : "none", color: config.optionBareme ? "#4a9e6b" : "#666", fontSize:12, cursor:"pointer", fontFamily:"inherit" }}>
            {config.optionBareme ? "✓ Activée" : "Désactivée"}
          </button>
        </div>
        <div style={{ marginLeft:"auto", textAlign:"right" }}>
          <div style={{ fontSize:9, color:"#555", letterSpacing:"0.06em" }}>PRESSION FISCALE ESTIMÉE</div>
          <div style={{ fontSize:22, fontWeight:"bold", color: tauxPression > 35 ? "#e05555" : tauxPression > 20 ? "#00E1DC" : "#4a9e6b" }}>{pct(tauxPression)}</div>
          <div style={{ fontSize:10, color:"#555" }}>sur revenus déclarés</div>
        </div>
      </div>

      {reportMode === "advisor" && (
        <AdvisorOpportunityPanel opportunities={fiscalAdvisorOpportunities} lang={lang} />
      )}

      {/* ── Stats résumé ── */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:12, marginBottom:20 }}>
        {[
          { label:"IMPÔTS ANNUELS COURANTS",  value: fmt(taxCourante)+" €",  color:"#e05555" },
          { label:"FISCALITÉ LATENTE",         value: fmt(taxLatente)+" €",   color:"#00E1DC", sub:"si tout réalisé aujourd'hui" },
          { label:"IFI ESTIMÉ",                value: fmt(ifi)+" €",          color: ifi>0 ? "#e8a055" : "#444", sub: ifi>0 ? "patrimoine immo > 1,3 M€" : "Non applicable" },
          { label:"TOTAL + LATENT",            value: fmt(taxCourante+taxLatente)+" €", color:"#9a8ec9" },
        ].map(s => (
          <div key={s.label} style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(0,225,220,0.1)", borderRadius:10, padding:"14px 16px" }}>
            <div style={{ fontSize:9, color:"#666", letterSpacing:"0.08em", marginBottom:6 }}>{s.label}</div>
            <div style={{ fontSize:17, fontWeight:"bold", color:s.color }}>{s.value}</div>
            {s.sub && <div style={{ fontSize:9, color:"#555", marginTop:3 }}>{s.sub}</div>}
          </div>
        ))}
      </div>

      {/* ── Fiscalité courante ── */}
      {taxCourante > 0 && (
        <div style={{ background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:10, marginBottom:16, overflow:"hidden" }}>
          <div style={{ padding:"12px 14px", borderBottom:"1px solid rgba(255,255,255,0.07)", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <div style={{ fontSize:11, color:"#00E1DC", fontWeight:"bold", letterSpacing:"0.06em" }}>📋 FISCALITÉ COURANTE — REVENUS DÉCLARÉS</div>
            <div style={{ fontSize:13, color:"#e05555", fontWeight:"bold" }}>{fmt(taxCourante)} € / an</div>
          </div>
          <ROW label="Revenus d'activité (salaires, freelance…)" base={Math.max(0,revAct-abPro)} taux={"TMI "+config.tmi+"%"} tax={taxAct} color="#4a9e6b" note={"Abattement forfaitaire 10% appliqué · Base imposable "+fmt(Math.max(0,revAct-abPro))+" €"} />
          <ROW label="Retraites & pensions" base={Math.max(0,revRet-Math.min(4321,Math.max(422,revRet*0.10)))} taux={"TMI "+config.tmi+"%"} tax={taxRet} color="#8b9e4a" note="Abattement 10% (422€ min · 4 321€ max)" />
          <ROW label="Dividendes CTO" base={divCTO} taux={config.optionBareme && taxDivBareme < taxDivPFU ? "Barème (abatt. 40%)" : "PFU 30%"} tax={taxDivCTO} color="#a8c4e8" note={config.optionBareme ? "Option barème : "+fmt(divCTO)+" × 60% × TMI + 17,2% PS" : "Flat tax 12,8% IR + 17,2% PS"} />
          <ROW label="Dividendes PEA (après 5 ans)" base={divPEA} taux="PS 17,2%" tax={taxDivPEA} color="#4a9e6b" note="Exonération IR après 5 ans — prélèvements sociaux uniquement" />
          <ROW label="Loyers nus — micro-foncier" base={loyNus*0.70} taux={"TMI "+config.tmi+"% + 17,2% PS"} tax={taxLoyer} color="#a0c4ff" note="Abattement forfaitaire 30% (micro-foncier)" />
          <ROW label="Loyers meublés — micro-BIC (LMNP)" base={loyLMNP*0.50} taux={"TMI "+config.tmi+"% + 17,2% PS"} tax={taxLMNP} color="#a0c4ff" note="Abattement forfaitaire 50% (micro-BIC)" />
          <ROW label="Intérêts imposables (hors livrets réglementés)" base={intImp} taux="PFU 30%" tax={taxInt} color="#7a9ec9" note="Livret A, LEP, LDDS exonérés — reste soumis au PFU" />
          {ifi > 0 && <ROW label="IFI — Impôt sur la Fortune Immobilière" base={immoBase} taux="Barème IFI" tax={ifi} color="#e8a055" note={"Patrimoine immobilier imposable : "+fmt(immoBase)+" € (déduction dettes estimée)"} bold />}
        </div>
      )}

      {/* ── Fiscalité latente ── */}
      {taxLatente > 0 && (
        <div style={{ background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:10, marginBottom:16, overflow:"hidden" }}>
          <div style={{ padding:"12px 14px", borderBottom:"1px solid rgba(255,255,255,0.07)", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <div style={{ fontSize:11, color:"#00E1DC", fontWeight:"bold", letterSpacing:"0.06em" }}>📊 FISCALITÉ LATENTE — SI CESSION TOTALE AUJOURD'HUI</div>
            <div style={{ fontSize:13, color:"#00E1DC", fontWeight:"bold" }}>{fmt(taxLatente)} €</div>
          </div>
          <ROW label="Plus-values PEA (latentes)" base={pvPEA} taux="PS 17,2% seulement" tax={taxPVPEA} color="#4a9e6b" note={"Plus-value non réalisée : "+fmt(pvPEA)+" € · Exonération IR après 5 ans PEA"} />
          <ROW label="Plus-values CTO (latentes)" base={pvCTO} taux="PFU 30%" tax={taxPVCTO} color="#a8c4e8" note={"Plus-value non réalisée : "+fmt(pvCTO)+" €"} />
          <ROW label="Gains AV (latents)" base={Math.max(0,pvAV-abattAV)} taux="7,5% IR + 17,2% PS" tax={taxPVAV} color="#7a9ec9" note={"Gain brut "+fmt(pvAV)+" € · Abattement annuel "+fmt(abattAV)+" € · Base imposable "+fmt(Math.max(0,pvAV-abattAV))+" €"} />
        </div>
      )}

      {/* ── Empty state ── */}
      {taxCourante === 0 && taxLatente === 0 && (
        <div style={{ textAlign:"center", padding:"60px 20px", color:"#555" }}>
          <div style={{ fontSize:40, marginBottom:12 }}>🧾</div>
          <div style={{ fontSize:14, color:"#777", marginBottom:6 }}>Aucune donnée à calculer</div>
          <div style={{ fontSize:12, color:"#444" }}>Renseignez vos revenus dans l'onglet Revenus et vos portefeuilles dans PEA / CTO / AV pour voir votre simulation fiscale</div>
        </div>
      )}

      {/* ── Disclaimer ── */}
      <div style={{ marginTop:16, padding:"12px 16px", background:"rgba(255,255,255,0.015)", border:"1px solid rgba(255,255,255,0.05)", borderRadius:8, fontSize:10, color:"#444", lineHeight:1.6 }}>
        ⚠️ <strong style={{ color:"#555" }}>Simulation indicative uniquement.</strong> Ces calculs sont des estimations basées sur les règles fiscales françaises générales (micro-foncier, micro-BIC, PFU, barème 2025). Ils ne tiennent pas compte de votre situation personnelle complète, des niches fiscales, des déficits reportables, de la CSG déductible, du mécanisme du quotient familial, ni des éventuels dispositifs de défiscalisation. Consultez un expert-comptable ou un conseiller fiscal pour votre situation réelle.
      </div>

    </div>
  );
}


function PEAAgent() {
  const [apiKey, setApiKey] = useState(() => localStorage.getItem("pea_apikey") || "");
  const [activeModule, setActiveModule] = useState(() => localStorage.getItem("mpb_module") || "pea");
  const [lang, setLang] = useState(() => localStorage.getItem("mpb_lang") || "fr");
  const [reportMode, setReportMode] = useState(() => localStorage.getItem("mpb_report_mode") || "advisor");
  const [confirmReset, setConfirmReset] = useState(false);
  // Calcule le total d'un portefeuille depuis localStorage sans monter le composant.
  // Compatible PEA / CTO / Assurance Vie, y compris les lignes « en attente » issues d'une allocation.
  const calcTotalFromStorage = (key) => {
    try {
      const lines = JSON.parse(localStorage.getItem(key) || "[]");
      return calcPortfolioTotalFromLines(lines);
    } catch { return 0; }
  };
  const [peaTotal, setPeaTotal] = useState(() => calcTotalFromStorage("pea_lines"));
  const [ctoTotal, setCtoTotal] = useState(() => calcTotalFromStorage("cto_lines"));
  const [avTotal, setAvTotal] = useState(() => calcTotalFromStorage("av_lines"));
  const [privateTotal, setPrivateTotal] = useState(() => calcPrivateMetrics(readJson("private_markets", [])).value);
  const [revenusAnnuels, setRevenusAnnuels] = useState(() => {
    try {
      const lignes = JSON.parse(localStorage.getItem("mpb_revenus") || "[]");
      const MULT = { mensuel: 12, trimestriel: 4, annuel: 1, ponctuel: 0 };
      return lignes.reduce((s, l) => s + parseFloat(l.montant||0) * (MULT[l.frequence] ?? 1), 0);
    } catch { return 0; }
  });

  // Immobilier state (remonté pour totalisation dans le header)
  const [immoBiens, setImmoBiens] = useState(() => {
    try { const s = localStorage.getItem("mpb_biens"); if (s !== null) { const p = JSON.parse(s); return Array.isArray(p) ? p : []; } } catch {}
    return [];
  });
  useEffect(() => { localStorage.setItem("mpb_biens", JSON.stringify(immoBiens)); }, [immoBiens]);

  // Calcul patrimoine immobilier net
  const immoValeur = immoBiens.reduce((s, b) => s + getBienValeur(b), 0);
  const immoDettes = immoBiens.reduce((s, b) => s + getBienDetteRestante(b), 0);
  const immoCapNet = immoValeur - immoDettes;
  const totalPatrimoine = peaTotal + ctoTotal + avTotal + immoCapNet + privateTotal;

  function saveApiKey(key) {
    localStorage.setItem("pea_apikey", key);
    setApiKey(key);
  }

  function loadTestProfile() {
    const profile = buildExecutiveTestProfile();
    TEST_PROFILE_STORAGE_KEYS.forEach(key => localStorage.removeItem(key));
    Object.entries(profile).forEach(([key, value]) => localStorage.setItem(key, JSON.stringify(value)));
    localStorage.setItem("mpb_module", "dashboard");
    localStorage.setItem("mpb_lang", lang);
    localStorage.setItem("mpb_report_mode", reportMode);
    window.location.reload();
  }

  if (!apiKey) return <ApiKeySetup onSave={saveApiKey} />;

  return (
	    <div style={{ minHeight: "100vh", background: "linear-gradient(135deg,#0a0a0f 0%,#0d1117 40%,#0a0f0a 100%)", fontFamily: SIA_FONT_STACK, color: "#F5F7FA" }}>
      <style>{`
        @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
        @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        .cursor{display:inline-block;width:2px;height:1em;background:#00E1DC;margin-left:2px;vertical-align:middle;animation:blink 0.8s infinite}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .msg-in{animation:fadeIn 0.3s ease}
        textarea,input,select{outline:none}
        ::-webkit-scrollbar{width:4px;height:4px}
        ::-webkit-scrollbar-thumb{background:#00E1DC44;border-radius:2px}
        table{border-collapse:collapse;width:100%}
        th{font-size:10px;letter-spacing:0.1em;color:#888;text-transform:uppercase;padding:8px 10px;text-align:right;border-bottom:1px solid rgba(0,225,220,0.15);white-space:nowrap}
        th:first-child,th:nth-child(2){text-align:left}
        td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.04);text-align:right;font-size:13px;vertical-align:middle}
        td:first-child,td:nth-child(2){text-align:left}
	        tr:hover td{background:rgba(0,225,220,0.04)}
	        button:focus{outline:none}
	        @media print{
	          @page{size:A4 landscape;margin:10mm}
	          body{background:#0a0a0f!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
	          button,textarea,input,select{display:none!important}
	          .client-report{break-inside:avoid;page-break-inside:avoid}
	        }
	      `}</style>

      {/* ── BANDEAU TECHNIQUE POC : hors header produit, non sticky ── */}
      <div style={{ padding: "8px 24px", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12, background: "rgba(255,255,255,0.025)", borderBottom: "1px solid rgba(255,255,255,0.08)", color: "#888", fontSize: 11 }}>
        <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
          <span style={{ color:"#555", letterSpacing:"0.08em", fontWeight:"bold" }}>POC · CONTRÔLES TECHNIQUES</span>
          <div style={{ display:"flex", gap:5, alignItems:"center" }} title={lang === "en" ? "Change language" : "Changer de langue"}>
            {[["fr","🇫🇷"],["en","🇬🇧"]].map(([code,flag]) => (
              <button key={code} onClick={() => { setLang(code); localStorage.setItem("mpb_lang", code); }}
                style={{ width:30, height:28, borderRadius:8, border: lang === code ? "1px solid rgba(0,225,220,0.65)" : "1px solid rgba(255,255,255,0.08)", background: lang === code ? "rgba(0,225,220,0.14)" : "rgba(255,255,255,0.03)", cursor:"pointer", fontSize:15, lineHeight:"25px" }}>
                {flag}
              </button>
            ))}
          </div>
          {["advisor","client"].map(m => (
            <button key={m} onClick={() => { setReportMode(m); localStorage.setItem("mpb_report_mode", m); }}
              title={m === "advisor" ? tr(lang, "advisorModeHelp") : tr(lang, "clientModeHelp")}
              style={{ background: reportMode === m ? "rgba(0,225,220,0.16)" : "rgba(255,255,255,0.03)", border: reportMode === m ? "1px solid rgba(0,225,220,0.45)" : "1px solid rgba(255,255,255,0.08)", borderRadius:8, color: reportMode === m ? "#00E1DC" : "#777", padding:"7px 11px", fontSize:11, cursor:"pointer", fontFamily:"inherit", minWidth:94, lineHeight:1.15 }}>
              {m === "advisor" ? tr(lang, "advisorMode") : tr(lang, "clientMode")}
            </button>
          ))}
          <InfoTip text={reportMode === "advisor" ? tr(lang, "advisorModeHelp") : tr(lang, "clientModeHelp")} />
          <button onClick={loadTestProfile}
            title="Charge un profil démo complet : cadre dirigeant 50 ans, environ 1,5 M€ d'actifs"
            style={{ background:"rgba(154,142,201,0.18)", border:"1px solid rgba(154,142,201,0.45)", borderRadius:8, color:"#c9bfff", padding:"7px 12px", cursor:"pointer", fontFamily:"inherit", fontSize:11, fontWeight:"bold" }}>
            Profil test 1,5 M€
          </button>
        </div>
        <div style={{ color:"#555" }}>Masqué en version production</div>
      </div>

      {/* ── HEADER PRODUIT ── */}
	      <div style={{ borderBottom: "1px solid rgba(0,225,220,0.2)", padding: "16px 24px", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 18, background: "rgba(0,0,0,0.4)", backdropFilter: "blur(20px)", position: "relative", zIndex: 2 }}>
	        <div style={{ display: "flex", alignItems: "center", gap: 12, minWidth: 360 }}>
	          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", padding: "2px 0" }}><SiaLogo size="header" /></div>
	          <div>
	            <div style={{ fontWeight: "bold", fontSize: 16, letterSpacing: "0.05em", color: "#00E1DC" }}>SIA PRIVATE BANKING AGENT</div>
	            <div style={{ fontSize: 11, color: "#888", letterSpacing: "0.1em" }}>{tr(lang, "headerSubtitle")}</div>
	          </div>
	        </div>
	        <div style={{ flex: 1 }} />
        <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
          {totalPatrimoine > 0 && (
            <div style={{ textAlign: "right" }}>
              <div style={{ fontSize: 11, color: "#888", letterSpacing: "0.08em", marginBottom: 2 }}>PATRIMOINE TOTAL</div>
              <div style={{ fontSize: 18, fontWeight: "bold", color: "#00E1DC" }}>{Math.round(totalPatrimoine).toLocaleString('fr-FR')} €</div>
              <div style={{ fontSize: 11, color: "#666", display: "flex", gap: 10, justifyContent: "flex-end", marginTop: 2 }}>
                {peaTotal > 0 && <span style={{ color: "#4a9e6b" }}>📈 PEA {Math.round(peaTotal).toLocaleString('fr-FR')} €</span>}
                {ctoTotal > 0 && <span style={{ color: "#a8c4e8" }}>💼 CTO {Math.round(ctoTotal).toLocaleString('fr-FR')} €</span>}
                {avTotal > 0 && <span style={{ color: "#7a9ec9" }}>🛡️ AV {Math.round(avTotal).toLocaleString('fr-FR')} €</span>}
                {immoCapNet > 0 && <span style={{ color: "#a0c4ff" }}>🏠 {Math.round(immoCapNet).toLocaleString('fr-FR')} €</span>}
	                {privateTotal > 0 && <span style={{ color: "#9a8ec9" }}>◆ {tr(lang, "privateLabel")} {Math.round(privateTotal).toLocaleString('fr-FR')} €</span>}
                {revenusAnnuels > 0 && <span style={{ color: "#4a9e6b" }}>💰 {Math.round(revenusAnnuels).toLocaleString('fr-FR')} €/an</span>}
              </div>
            </div>
          )}
          {confirmReset ? (
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ fontSize: 12, color: "#00E1DC" }}>Tout réinitialiser ?</span>
              <button onClick={() => { localStorage.clear(); window.location.reload(); }}
                style={{ background: "#e05555", border: "none", borderRadius: 6, padding: "4px 10px", cursor: "pointer", color: "#fff", fontSize: 12, fontFamily: "inherit" }}>
                Oui
              </button>
              <button onClick={() => setConfirmReset(false)} style={{ background: "rgba(255,255,255,0.1)", border: "none", borderRadius: 6, padding: "4px 10px", cursor: "pointer", color: "#aaa", fontSize: 12, fontFamily: "inherit" }}>
                Non
              </button>
            </div>
          ) : (
            <button onClick={() => setConfirmReset(true)} title="Réinitialiser toutes les données"
              style={{ background: "rgba(0,225,220,0.1)", border: "1px solid rgba(0,225,220,0.2)", borderRadius: 8, padding: "6px 10px", cursor: "pointer", color: "#888", fontSize: 14, fontFamily: "inherit" }}>
              🗑️
            </button>
          )}
          {/* Export données */}
          <button title="Exporter toutes mes données (sauvegarde JSON)"
            onClick={() => {
              const KEYS = ["pea_lines","pea_messages","pea_perfHistory","cto_lines","cto_messages","cto_perfHistory","av_lines","av_messages","av_perfHistory","mpb_biens","mpb_revenus","mpb_revenus_dismissed","mpb_snapshots","private_markets","mpb_report_mode","mpb_lang"];
              const data = { _version: "1.0", _date: new Date().toISOString() };
              KEYS.forEach(k => { const v = localStorage.getItem(k); if (v) { try { data[k] = JSON.parse(v); } catch {} } });
              const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
              const url = URL.createObjectURL(blob);
              const a = document.createElement("a"); a.href = url;
              a.download = `my-private-bank-${new Date().toISOString().slice(0,10)}.json`;
              a.click(); URL.revokeObjectURL(url);
            }}
            style={{ background: "rgba(74,158,107,0.15)", border: "1px solid rgba(74,158,107,0.35)", borderRadius: 8, padding: "6px 10px", cursor: "pointer", color: "#4a9e6b", fontSize: 14, fontFamily: "inherit" }}>
            💾
          </button>
          {/* Import données */}
          <button title="Importer une sauvegarde JSON"
            onClick={() => {
              const input = document.createElement("input"); input.type = "file"; input.accept = ".json";
              input.onchange = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                  try {
                    const data = JSON.parse(ev.target.result);
                    const { _version, _date, ...keys } = data;
                    if (!window.confirm(`Importer la sauvegarde du ${_date ? new Date(_date).toLocaleDateString('fr-FR') : "?"} ? Vos données actuelles seront remplacées.`)) return;
                    Object.entries(keys).forEach(([k, v]) => localStorage.setItem(k, JSON.stringify(v)));
                    window.location.reload();
                  } catch(err) { alert("Fichier invalide : " + err.message); }
                };
                reader.readAsText(file);
              };
              input.click();
            }}
            style={{ background: "rgba(106,142,201,0.15)", border: "1px solid rgba(106,142,201,0.35)", borderRadius: 8, padding: "6px 10px", cursor: "pointer", color: "#6a8ec9", fontSize: 14, fontFamily: "inherit" }}>
            📂
          </button>
          <button
            onClick={() => { if (window.confirm("Réinitialiser la clé API ?")) { localStorage.removeItem("pea_apikey"); setApiKey(""); } }}
            title="Changer de clé API"
            style={{ background: "rgba(0,225,220,0.1)", border: "1px solid rgba(0,225,220,0.2)", borderRadius: 8, padding: "6px 10px", cursor: "pointer", color: "#888", fontSize: 14, fontFamily: "inherit" }}>
            🔑
          </button>
        </div>
      </div>

      {/* ── MODULE NAVIGATION ── */}
      <div style={{ display: "flex", borderBottom: "1px solid rgba(0,225,220,0.25)", padding: "0 20px", background: "rgba(0,0,0,0.35)", gap: 2 }}>
        {[
          { id: "dashboard", label: "📊 " + tr(lang, "dashboard"),      soon: false },
          { id: "pea",       label: "📈 PEA",            soon: false },
          { id: "immo", label: "🏠 Immobilier",       soon: false },
          { id: "av",   label: "🛡️ Assurance Vie",    soon: false },
	          { id: "cto",  label: "💼 CTO",              soon: false },
	          { id: "private", label: "◆ " + tr(lang, "privateMarkets"),  soon: false },
	          { id: "revenus", label: "💰 Revenus",           soon: false },
          { id: "fiscal",  label: "🧾 Fiscalité",         soon: false },
        ].map(m => (
          <button key={m.id} onClick={() => { if (!m.soon) { setActiveModule(m.id); localStorage.setItem("mpb_module", m.id); } }}
            style={{ background: "none", border: "none", cursor: m.soon ? "default" : "pointer", padding: "9px 16px", fontSize: 12, color: activeModule === m.id ? "#00E1DC" : m.soon ? "#3a3a4a" : "#666", borderBottom: activeModule === m.id ? "2px solid #00E1DC" : "2px solid transparent", fontFamily: "inherit", letterSpacing: "0.04em", display: "flex", alignItems: "center", gap: 5, transition: "color 0.2s" }}>
            {m.label}
            {m.soon && <span style={{ fontSize: 8, color: "#444", background: "rgba(255,255,255,0.04)", padding: "1px 4px", borderRadius: 3, letterSpacing: "0.05em" }}>bientôt</span>}
          </button>
        ))}
      </div>

      {/* ── MODULES ── */}
	      {activeModule === "dashboard" && <DashboardModule peaTotal={peaTotal} ctoTotal={ctoTotal} avTotal={avTotal} immoCapNet={immoCapNet} privateTotal={privateTotal} totalPatrimoine={totalPatrimoine} revenusAnnuels={revenusAnnuels} immoBiens={immoBiens} apiKey={apiKey} lang={lang} reportMode={reportMode} />}
      {activeModule === "pea"  && <PortfolioModule type="pea"  apiKey={apiKey} onTotalChange={setPeaTotal} reportMode={reportMode} lang={lang} />}
      {activeModule === "cto"  && <PortfolioModule type="cto"  apiKey={apiKey} onTotalChange={setCtoTotal} reportMode={reportMode} lang={lang} />}
	      {activeModule === "av"   && <PortfolioModule type="av"   apiKey={apiKey} onTotalChange={setAvTotal} reportMode={reportMode} lang={lang} />}
	      {activeModule === "immo"    && <ImmoModule biens={immoBiens} setBiens={setImmoBiens} reportMode={reportMode} lang={lang} />}
	      {activeModule === "private" && <PrivateMarketsModule onTotalChange={setPrivateTotal} lang={lang} reportMode={reportMode} />}
	      {activeModule === "revenus" && <RevenusModule patrimoine={totalPatrimoine} onTotalChange={setRevenusAnnuels} immoBiens={immoBiens} reportMode={reportMode} lang={lang} />}
      {activeModule === "fiscal"  && <FiscaliteModule immoBiens={immoBiens} peaTotal={peaTotal} ctoTotal={ctoTotal} avTotal={avTotal} reportMode={reportMode} lang={lang} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<PEAAgent />);
</script>
</body>
</html>
