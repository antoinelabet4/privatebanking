      const res = await fetchWebPrice(ticker, normalizeTickerForSearch(ticker));
      const snippets = (res.snippets || []).slice(0, 2).join(" | ");
      return `  • ${label} : ${res.price.toFixed(2)} ${res.currency || "EUR"} [Web search: ${snippets || "résultat non détaillé"}]`;
    } catch(e) {
      return `  • ${label} : N/D [${e.message}]`;
    }
  }));

  let macro = "N/D";
  try {
    const macroResults = await fetchWebSearchResults("BCE taux directeurs inflation zone euro marchés aujourd'hui", 4);
    macro = macroResults.map(r => `  • ${r.title}: ${r.snippet}`).join("\n");
  } catch(e) {
    macro = `  • Web search macro indisponible: ${e.message}`;
  }

  return `Contexte sourcé par web search classique (Paris, ${now}) :\n${rows.join('\n')}\n\nContexte macro récent :\n${macro}\n\nNote : les valeurs chiffrées sont extraites d'extraits web non structurés. Si une donnée est N/D ou ambiguë, l'agent doit le dire explicitement et éviter d'inventer.`;
}

function PortfolioModule({ type, apiKey, onTotalChange, reportMode = "advisor", lang = "fr" }) {
  const cfg = PORTFOLIO_CONFIGS[type];
  const DEMO_LINES_VAR = type === "pea" ? DEMO_LINES : type === "cto" ? CTO_DEMO_LINES : AV_DEMO_LINES;
  const QUICK_PROMPTS_VAR = type === "pea" ? QUICK_PROMPTS : type === "cto" ? CTO_QUICK_PROMPTS : AV_QUICK_PROMPTS;
  const SYSTEM_PROMPT_VAR = type === "pea" ? SYSTEM_PROMPT : type === "cto" ? CTO_SYSTEM_PROMPT : AV_SYSTEM_PROMPT;
  const REALLOC_PROMPT_VAR = type === "pea" ? REALLOC_PROMPT : type === "cto" ? CTO_REALLOC_PROMPT : AV_REALLOC_PROMPT;

  const [messages, setMessages] = useState(() => {
    try {
      const s = localStorage.getItem(`${cfg.prefix}_messages`);
      if (s) return JSON.parse(s);
    } catch {}
    return [{
      role: "assistant",
      content: cfg.initialMessage,
      ts: new Date().toLocaleString('fr-FR')
    }];
  });

  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [activeTab, setActiveTab] = useState(() => {
    try {
      const s = localStorage.getItem(`${cfg.prefix}_lines`);
      const p = s ? JSON.parse(s) : null;
      return (p && p.length > 0) ? "dashboard" : "dashboard";
    } catch {}
    return "dashboard";
  });

  const [lines, setLines] = useState(() => {
    try {
      const s = localStorage.getItem(`${cfg.prefix}_lines`);
      // s === null → première visite → montrer le démo
      // s === "[]" → utilisateur a vidé son portefeuille → retourner []
      if (s !== null) {
        const p = JSON.parse(s);
        return Array.isArray(p) ? p : [];
      }
    } catch {}
    return DEMO_LINES_VAR;
  });

  const [newLine, setNewLine] = useState({ ticker: "", nom: "", categorie: "", qte: "", pru: "", prixActuel: "", cible: 0, geography: "", sector: "", currency: "EUR", riskLevel: "Medium", volatility: "", rating: "", style: "" });
  const [showAddForm, setShowAddForm] = useState(false);
  const [expandedTx, setExpandedTx] = useState(null);
  const [newTx, setNewTx] = useState({ date: new Date().toISOString().slice(0,10), qte: "", prix: "", type: "achat" });
  const [reallocLoading, setReallocLoading] = useState(false);
  const [reallocResult, setReallocResult] = useState(null);
  const [priceStatus, setPriceStatus] = useState({});
  const [marketFetching, setMarketFetching] = useState(false);
  const [perfHistory, setPerfHistory] = useState(() => {
    try {
      const s = localStorage.getItem(`${cfg.prefix}_perfHistory`);
      return s ? JSON.parse(s) : [];
    } catch {}
    return [];
  });
  const [benchmarks, setBenchmarks] = useState(null);
  const [showTestPanel, setShowTestPanel] = useState(false);
  const [testResults, setTestResults] = useState(null);
  const [testRunning, setTestRunning] = useState(false);
  const [cashInput, setCashInput] = useState("");
  const [importNotice, setImportNotice] = useState(null);
  const messagesEndRef = useRef(null);

  // ── Storage sync ──
  useEffect(() => {
    localStorage.setItem(`${cfg.prefix}_lines`, JSON.stringify(lines));
  }, [lines, cfg.prefix]);

  useEffect(() => {
    localStorage.setItem(`${cfg.prefix}_messages`, JSON.stringify(messages));
  }, [messages, cfg.prefix]);

  useEffect(() => {
    localStorage.setItem(`${cfg.prefix}_perfHistory`, JSON.stringify(perfHistory));
  }, [perfHistory, cfg.prefix]);

  // ── Scroll to latest message ──
  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [messages]);

  // ── Fetch benchmarks ──
  useEffect(() => {
    if (perfHistory.length < 2) return;
    fetchBenchmarks(perfHistory[0].date).then(bm => {
      if (Object.keys(bm).length > 0) setBenchmarks(bm);
    }).catch(() => {});
  }, [perfHistory.length]);

  // ── Call onTotalChange when totalActuel changes ──
  const onTotalChangeRef = useRef(onTotalChange);
  onTotalChangeRef.current = onTotalChange;

  // ── Computed values ──
  const calcWeightedPRU = (txs) => {
    const buys = txs.filter(t => t.type === "achat");
    const totalQte = buys.reduce((s, t) => s + (parseFloat(t.qte) || 0), 0);
    if (totalQte === 0) return 0;
    const totalCost = buys.reduce((s, t) => s + (parseFloat(t.qte) || 0) * (parseFloat(t.prix) || 0), 0);
    return totalCost / totalQte;
  };

  const calcNetQte = (txs) => {
    let qte = 0;
    for (const t of txs) {
      const q = parseFloat(t.qte) || 0;
      qte += t.type === "achat" ? q : -q;
    }
    return qte;
  };

  // Si une ligne vient d'une allocation mais que le prix live n'est pas encore chargé,
  // on valorise quand même la ligne avec le montant alloué.
  // Cela évite d'avoir des KPI à 0 et des PRU vides avant l'actualisation des prix.
  const lineVal = (l) => getLineCurrentValue(l);
  const linePRU = (l) => getLinePRUTotal(l);
  const totalActuel = calcPortfolioTotalFromLines(lines);
  const totalPRU = calcPortfolioPRUFromLines(lines);
  const totalPnL = totalActuel - totalPRU;
  const totalPnLPct = totalPRU > 0 ? (totalPnL / totalPRU) * 100 : 0;

  const lineRows = lines.map((l, idx) => ({
    ...l,
    val: lineVal(l),
    pru_total: linePRU(l),
    pnl: lineVal(l) - linePRU(l),
    pnl_pct: linePRU(l) > 0 ? ((lineVal(l) - linePRU(l)) / linePRU(l)) * 100 : 0,
    intelligence: getLineIntelligence(l, type),
  }));
  const portfolioAdvisorOpportunities = buildPortfolioAdvisorOpportunities(type, lineRows, totalActuel, lang);

  const hasPendingQte = lines.some(l => l._pendingQte);
  const hasPruEstimated = lines.some(l => l._pruEstimated);
  const portfolioStartDate = lines[0]?.transactions?.[0]?.date || new Date().toISOString().slice(0,10);
  const globalAnnualReturn = (() => {
    if (perfHistory.length === 0) return 0;
    const startVal = perfHistory[0]?.totalVal || totalPRU;
    if (!startVal || startVal <= 0) return 0;
    const days = (Date.now() - new Date(perfHistory[0].date).getTime()) / (24*3600*1000);
    if (days < 30) return 0;
    const r = (totalActuel - startVal) / startVal;
    return (Math.pow(1 + r, 365 / days) - 1) * 100;
  })();

  // ── Callbacks for portfolio operations ──
  const updateLine = (id, updates) => {
    setLines(prev => prev.map(l => l.id === id ? { ...l, ...updates } : l));
  };

  const deleteLine = (id) => {
    setLines(prev => prev.filter(l => l.id !== id));
  };

  const addLine = () => {
    if (!newLine.ticker || !newLine.nom) {
      alert("Ticker et Nom sont requis");
      return;
    }
    const id = Math.max(...lines.map(l => l.id || 0), 0) + 1;
    const qte = parseFloat(newLine.qte) || 0;
    const pru = parseFloat(newLine.pru) || 0;
    const prixActuel = parseFloat(newLine.prixActuel) || pru;
    const newId = {
      id,
      ticker: newLine.ticker.toUpperCase(),
      nom: newLine.nom,
      categorie: newLine.categorie || "Autre",
      qte: qte > 0 ? qte : 0,
      pru: pru > 0 ? pru : 0,
      prixActuel: prixActuel > 0 ? prixActuel : 0,
      cible: parseFloat(newLine.cible) || 0,
      geography: newLine.geography || "",
      sector: newLine.sector || "",
      currency: newLine.currency || "EUR",
      riskLevel: newLine.riskLevel || "Medium",
      volatility: newLine.volatility || "",
      rating: newLine.rating || "",
      style: newLine.style || "",
      transactions: qte > 0 && pru > 0 ? [{
        id: 1,
        date: new Date().toISOString().slice(0,10),
        type: "achat",
        qte,
        prix: pru,
        note: ""
      }] : [],
      _pendingQte: parseFloat(newLine._montant) > 0 && qte === 0,
      _montant: parseFloat(newLine._montant) || 0
    };
    setLines([...lines, newId]);
    setNewLine({ ticker: "", nom: "", categorie: "", qte: "", pru: "", prixActuel: "", cible: 0, geography: "", sector: "", currency: "EUR", riskLevel: "Medium", volatility: "", rating: "", style: "" });
    setShowAddForm(false);
  };

  const addTransaction = (lineId) => {
    if (!newTx.qte || !newTx.prix) {
      alert("Quantité et Prix requis");
      return;
    }
    setLines(prev => prev.map(l => {
      if (l.id !== lineId) return l;
      const transactions = (l.transactions || []);
      const maxId = Math.max(...transactions.map(t => t.id || 0), 0);
      const newTransaction = {
        id: maxId + 1,
        date: newTx.date,
        type: newTx.type,
        qte: parseFloat(newTx.qte),
        prix: parseFloat(newTx.prix),
        note: ""
      };
      const newTxs = [...transactions, newTransaction];
      const newPru = calcWeightedPRU(newTxs);
      const newQte = calcNetQte(newTxs);
      return { ...l, transactions: newTxs, pru: newPru > 0 ? newPru : l.pru, qte: newQte >= 0 ? newQte : 0, _pruEstimated: false };
    }));
    setNewTx({ date: new Date().toISOString().slice(0,10), qte: "", prix: "", type: "achat" });
  };

  const removeTransaction = (lineId, txId) => {
    setLines(prev => prev.map(l => {
      if (l.id !== lineId) return l;
      const transactions = (l.transactions||[]).filter(t => t.id !== txId);
      if (transactions.length === 0) return { ...l, transactions };
      const newPru = calcWeightedPRU(transactions);
      const newQte = calcNetQte(transactions);
      return { ...l, transactions, pru: newPru > 0 ? newPru : l.pru, qte: newQte >= 0 ? newQte : 0 };
    }));
  };

  // ── Stream Claude messages ──
  const streamClaude = async (userMsg, systemMsg) => {
    if (loading) return;
    setLoading(true);
    const allMessages = [...messages, { role: "user", content: userMsg, ts: new Date().toLocaleString('fr-FR') }];
    setMessages(allMessages);

    try {
      const marketData = await withTimeout(
        fetchLiveMarketContext().catch(() => "Données de marché indisponibles"),
        12000,
        "Données de marché indisponibles : délai dépassé. Continue l'analyse avec les données locales du portefeuille."
      );
      const systemPromptFinal = systemMsg.replace("{{LIVE_MARKET_DATA}}", marketData) + "\n\n" + CHAT_STYLE_RULES + "\n\n" + ALLOCATION_OUTPUT_RULES;

      const response = await fetchWithTimeout("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-5-20250929",
          max_tokens: 4096,
          system: systemPromptFinal,
          messages: allMessages.map(m => ({ role: m.role, content: m.content }))
        })
      }, 45000, "Appel IA Anthropic");

      if (!response.ok) {
        const errData = await response.json();
        throw new Error(errData.error?.message || `HTTP ${response.status}`);
      }

      const data = await response.json();
      const assistantMsg = data.content?.[0]?.text || "Pas de réponse";

      // Garder le bloc ALLOCATION_JSON dans l'historique : le composant Message
      // l'utilise pour afficher la carte d'allocation et le bouton d'import.
      setMessages([...allMessages, { role: "assistant", content: assistantMsg, ts: new Date().toLocaleString('fr-FR') }]);
      setInput("");
    } catch (err) {
      setMessages([...allMessages, { role: "assistant", content: `Erreur d'envoi : ${err.message || err}. Le message est bien parti dans le chat, mais la réponse IA n'a pas pu être récupérée. Vérifiez la clé API, la connexion ou réessayez.`, ts: new Date().toLocaleString('fr-FR') }]);
    } finally {
      setLoading(false);
    }
  };

  const sendMessage = (overrideText) => {
    if (loading) return;
    const rawText = typeof overrideText === "string" ? overrideText : input;
    const userMsg = rawText.trim();
    if (!userMsg) return;
    if (!apiKey) {
      alert("Veuillez configurer votre clé API");
      return;
    }
    if (overrideText === undefined) setInput("");

    const portfolioContext = lineRows.length > 0
      ? `Portefeuille actuel ${cfg.label}:\n${lineRows.map(l => `- ${l.ticker} ${l.nom}: ${parseFloat(l.qte||0)}u @ ${parseFloat(l.pru||0).toFixed(2)}€ PRU → ${parseFloat(l.prixActuel||0).toFixed(2)}€ (cible: ${l.cible||0}%)`).join("\n")}\nTotal: ${totalActuel.toFixed(2)}€ | P&L: ${totalPnL.toFixed(2)}€ (${totalPnLPct.toFixed(1)}%)`
      : `Portefeuille ${cfg.label} vide`;

    const augmentedMsg = `${userMsg}\n\n[${portfolioContext}]`;
    streamClaude(augmentedMsg, SYSTEM_PROMPT_VAR);
  };

  const runRealloc = async () => {
    if (!apiKey) { alert("Veuillez configurer votre clé API"); return; }
    setReallocLoading(true);
    setReallocResult(null);

    const portfolioContext = lineRows.map(l =>
      `- ${l.ticker} ${l.nom}: ${parseFloat(l.qte||0)}u @ ${parseFloat(l.pru||0).toFixed(2)}€ PRU → ${parseFloat(l.prixActuel||0).toFixed(2)}€ (cible: ${l.cible||0}%, P&L: ${l.pnl.toFixed(2)}€)`
    ).join("\n");

    const msg = `Rééquilibre mensuel du portefeuille ${cfg.label}:\n${portfolioContext}\n\nTotal: ${totalActuel.toFixed(2)}€ | Perf globale: ${totalPnLPct.toFixed(1)}%`;

    try {
      const marketData = await fetchLiveMarketContext().catch(() => "Données indisponibles");
      const systemFinal = REALLOC_PROMPT_VAR.replace("{{LIVE_MARKET_DATA}}", marketData);
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "x-api-key": apiKey, "anthropic-version": "2023-06-01", "content-type": "application/json", "anthropic-dangerous-direct-browser-access": "true" },
        body: JSON.stringify({ model: "claude-opus-4-5-20251101", max_tokens: 2000, system: systemFinal, messages: [{ role: "user", content: msg }] })
      });
      const data = await res.json();
      setReallocResult(data.content?.[0]?.text || "Erreur lors de l'analyse.");
    } catch(e) {
      setReallocResult("Erreur : " + e.message);
    }
    setReallocLoading(false);
  };

  const refreshAllPrices = async () => {
    const tickers = lines.filter(l => l.ticker !== "CASH");
    if (tickers.length === 0) return;
    const loadingState = {};
    tickers.forEach(l => { loadingState[l.ticker] = { loading: true }; });
    setPriceStatus(loadingState);
    for (const l of tickers) {
      try {
        const result = await fetchPricesForTicker(l.ticker);
        if (result) {
          setPriceStatus(prev => ({ ...prev, [l.ticker]: { price: result.price, sources: result.sources, errors: result.errors, count: result.count, loading: false } }));
          setLines(prev => prev.map(line => {
            if (line.ticker !== l.ticker) return line;
            if (line._pendingQte && line._montant > 0) {
              const newQte = Math.round(line._montant / result.price * 10000) / 10000;
              const updatedTx = (line.transactions || []).map((t, idx) =>
                idx === 0 ? { ...t, qte: newQte, prix: result.price, note: "PRU estimé (cliquez PRU pour corriger)" } : t
              );
              return { ...line, prixActuel: result.price, qte: newQte, pru: result.price, _pendingQte: false, _pruEstimated: true, transactions: updatedTx };
            }
            return { ...line, prixActuel: result.price };
          }));
        }
      } catch (e) {
        setPriceStatus(prev => ({ ...prev, [l.ticker]: { error: e.message, loading: false } }));
      }
    }
  };

  const runSourceTests = async () => {
    setTestRunning(true);
    setTestResults({});
    const tickers = ["CW8", "EWLD", "PAEEM"];
    const results = {};
    for (const ticker of tickers) {
      try {
        const r1 = await fetchPriceYahoo(ticker).catch(e => ({ error: e.message }));
        const r2 = await fetchPriceEuronext(ticker).catch(e => ({ error: e.message }));
        const r3 = await fetchPriceBoursorama(ticker).catch(e => ({ error: e.message }));
        results[ticker] = {
          yahoo: r1.error ? "❌ " + r1.error : "✅ " + r1.price.toFixed(2),
          euronext: r2.error ? "❌ " + r2.error : "✅ " + r2.price.toFixed(2),
          boursorama: r3.error ? "❌ " + r3.error : "✅ " + r3.price.toFixed(2),
        };
      } catch (e) {
        results[ticker] = { error: e.message };
      }
    }
    setTestResults(results);
    setTestRunning(false);
  };

  const importAllocation = (allocationData) => {
    const normalizedAllocation = (Array.isArray(allocationData) ? allocationData : [])
      .filter(item => item && item.ticker)
      .map(item => ({
        ticker: String(item.ticker || "").trim().toUpperCase(),
        nom: item.nom || item.name || item.ticker || "Support proposé",
        categorie: item.categorie || item.category || "Autre",
        cible: parseFloat(item.cible ?? item.target ?? 0) || 0,
        montant: parseFloat(item.montant ?? item.amount ?? 0) || 0,
      }));
    if (!normalizedAllocation.length) {
      alert("Aucune ligne d'allocation exploitable dans la réponse de l'agent.");
      return;
    }
    setLines(prev => {
      const updated = [...prev];
      for (const item of normalizedAllocation) {
        const existing = updated.find(l => l.ticker === item.ticker);
        if (existing) {
          existing.cible = item.cible || existing.cible;
          if (item.montant > 0 && (!existing.qte || parseFloat(existing.qte) === 0)) {
            existing._pendingQte = true;
            existing._montant = item.montant;
          }
        } else {
          const id = Math.max(...updated.map(l => l.id || 0), 0) + 1;
          updated.push({
            id,
            ticker: item.ticker,
            nom: item.nom,
            categorie: item.categorie,
            qte: 0,
            pru: 0,
            prixActuel: 0,
            cible: item.cible,
            transactions: [],
            _pendingQte: item.montant > 0,
            _montant: item.montant,
          });
        }
      }
      return updated;
    });
    setImportNotice(`${normalizedAllocation.length} ligne${normalizedAllocation.length > 1 ? "s" : ""} importée${normalizedAllocation.length > 1 ? "s" : ""} depuis le chat vers le dashboard ${cfg.label}.`);
    setActiveTab("dashboard");
  };

  // ── Update total when totalActuel changes ──
  useEffect(() => {
    if (onTotalChangeRef.current) {
      onTotalChangeRef.current(totalActuel);
    }
  }, [totalActuel]);

  // ── Main render ──
  return (
    <div style={{ padding: 20, background: "#0a0a0f", color: "#fff", fontFamily: "inherit" }}>
      {/* Tabs */}
      <div style={{ display: "flex", gap: 15, marginBottom: 20, borderBottom: "1px solid #333" }}>
        {["dashboard", "chat", "realloc", "add"].map(tab => (
          <button
            key={tab}
            onClick={() => setActiveTab(tab)}
            style={{
              padding: "10px 15px",
              background: activeTab === tab ? "rgba(106,142,201,0.2)" : "transparent",
              border: activeTab === tab ? "1px solid rgba(106,142,201,0.5)" : "none",
              color: activeTab === tab ? "#6a8ec9" : "#888",
              borderRadius: "6px 6px 0 0",
              cursor: "pointer",
              fontSize: 13,
              fontFamily: "inherit"
            }}
          >
            {tab === "dashboard" && "📊 Dashboard"}
            {tab === "chat" && "💬 Chat"}
            {tab === "realloc" && "🔄 Rééquilibrage"}
            {tab === "add" && "➕ Ajouter"}
          </button>
        ))}
      </div>

      {/* Dashboard Tab */}
      {activeTab === "dashboard" && (
        <div>
          {importNotice && (
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", gap:12, background:"linear-gradient(135deg,rgba(0,225,220,0.14),rgba(74,158,107,0.12))", border:"1px solid rgba(0,225,220,0.45)", borderRadius:10, padding:"12px 14px", marginBottom:18 }}>
              <div>
                <div style={{ color:"#00E1DC", fontWeight:"bold", fontSize:13 }}>Allocation migrée vers le dashboard</div>
                <div style={{ color:"#aaa", fontSize:12, marginTop:3 }}>{importNotice} Les montants sans prix live restent en attente jusqu'à actualisation.</div>
              </div>
              <button onClick={() => setImportNotice(null)} style={{ background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.12)", color:"#aaa", borderRadius:7, padding:"6px 10px", cursor:"pointer", fontFamily:"inherit" }}>OK</button>
            </div>
          )}

          {/* ── Onboarding : portefeuille vide ── */}
          {lineRows.length === 0 && (
            <div style={{ background: "linear-gradient(135deg, rgba(0,225,220,0.08), rgba(74,158,107,0.06))", border: "1px solid rgba(0,225,220,0.3)", borderRadius: 12, padding: 24, marginBottom: 24 }}>
              <div style={{ fontSize: 18, fontWeight: "bold", color: "#00E1DC", marginBottom: 8 }}>🚀 Démarrez votre {cfg.label}</div>
              <div style={{ fontSize: 13, color: "#888", marginBottom: 20, lineHeight: 1.6 }}>
                Entrez le montant disponible pour investir. Il sera ajouté comme ligne <strong style={{ color: "#00E1DC" }}>CASH</strong> et l'agent construira une allocation sur mesure en fonction de votre profil.
              </div>
              <div style={{ display: "flex", gap: 12, alignItems: "center", flexWrap: "wrap" }}>
                <div style={{ position: "relative" }}>
                  <input
                    type="number" min="0" placeholder="100 000"
                    value={cashInput}
                    onChange={e => setCashInput(e.target.value)}
                    onKeyDown={e => { if (e.key === "Enter" && cashInput) document.getElementById(`btn-start-${cfg.prefix}`).click(); }}
                    style={{ background: "rgba(255,255,255,0.06)", border: "1px solid rgba(0,225,220,0.4)", borderRadius: 8, padding: "10px 50px 10px 14px", color: "#e8d5b0", fontSize: 16, fontFamily: "inherit", width: 180, outline: "none" }}
                  />
                  <span style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", color: "#00E1DC", fontSize: 14, pointerEvents: "none" }}>€</span>
                </div>
                <button id={`btn-start-${cfg.prefix}`}

function DonutChart({ data, size, hole }) {
  const total = data.reduce(function(s,d){ return s+d.value; }, 0);
  if (total === 0) return null;
  const r = (size - hole) / 2;
  const cx = size / 2;
  const cy = size / 2;
  const circ = 2 * Math.PI * r;
  let cum = 0;
  return React.createElement("svg", { width: size, height: size, style: { transform:"rotate(-90deg)", flexShrink:0 } },
    data.map(function(d) {
      const pct = d.value / total;
      const dash = pct * circ;
      const offset = -(cum * circ);
      cum += pct;
      return React.createElement("circle", { key: d.id, cx: cx, cy: cy, r: r,
        fill: "none", stroke: d.color, strokeWidth: hole,
        strokeDasharray: dash + " " + (circ - dash),
        strokeDashoffset: offset });
    })
  );
}

function MiniLineChart({ snapshots, width, height }) {
  const cleanSnapshots = (Array.isArray(snapshots) ? snapshots : [])
    .map(function(s){ return { date: s.date || "", total: safeNum(s.total ?? s.value) }; })
    .filter(function(s){ return s.total > 0; });
  if (cleanSnapshots.length < 2) return (
    <div style={{ width:width, height:height, display:"flex", alignItems:"center", justifyContent:"center", color:"#444", fontSize:11 }}>
      Historique en construction — revenez demain
    </div>
  );
  const vals = cleanSnapshots.map(function(s){ return s.total; });
  const dates = cleanSnapshots.map(function(s){ return s.date; });
  const minV = Math.min.apply(null, vals);
  const maxV = Math.max.apply(null, vals);
  const pad = 28;
  const W = width - pad * 2;
  const H = height - pad * 2;
  const xOf = function(i){ return pad + (i / (vals.length - 1)) * W; };
  const yOf = function(v){ return maxV === minV ? pad + H/2 : pad + (1 - (v - minV) / (maxV - minV)) * H; };
  const pts = vals.map(function(v,i){ return xOf(i) + "," + yOf(v); }).join(" ");
  const areaD = "M " + xOf(0) + "," + yOf(vals[0]) + " " +
    vals.map(function(v,i){ return "L " + xOf(i) + " " + yOf(v); }).join(" ") +
    " L " + xOf(vals.length-1) + " " + (pad+H) + " L " + xOf(0) + " " + (pad+H) + " Z";
  const fmt = function(n){ return Math.round(n/1000) + "k"; };
  const tickCount = Math.min(5, cleanSnapshots.length);
  const step = Math.max(1, Math.floor((cleanSnapshots.length-1) / Math.max(1, tickCount-1)));
  const ticks = Array.from({length: tickCount}, function(_,i){ return i * step; });
  return (
    <svg width={width} height={height}>
      <defs>
        <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#00E1DC" stopOpacity="0.3" />
          <stop offset="100%" stopColor="#00E1DC" stopOpacity="0" />
        </linearGradient>
      </defs>
      <path d={areaD} fill="url(#areaGrad)" />
      <polyline points={pts} fill="none" stroke="#00E1DC" strokeWidth="2" strokeLinejoin="round" />
      {ticks.map(function(i){
        return (
          <g key={i}>
            <text x={xOf(i)} y={height-6} textAnchor="middle" fill="#555" fontSize="9">{dates[i] ? dates[i].slice(5) : ""}</text>
            <text x={pad-4} y={yOf(vals[i])+4} textAnchor="end" fill="#555" fontSize="9">{fmt(vals[i])}</text>
            <line x1={xOf(i)} y1={pad} x2={xOf(i)} y2={pad+H} stroke="rgba(255,255,255,0.04)" />
          </g>
        );
      })}
      <text x={xOf(vals.length-1)} y={yOf(vals[vals.length-1])-8} textAnchor="end" fill="#00E1DC" fontSize="10" fontWeight="bold">
        {Math.round(vals[vals.length-1]).toLocaleString("fr-FR")} €
      </text>
    </svg>
  );
}

function BarList({ data, total, max = 8, lang = "fr" }) {
  const rows = (data || []).filter(d => safeNum(d.value) > 0).slice(0, max);
  if (!rows.length) return <div style={{ color:"#555", fontSize:11, padding:"12px 0" }}>{tr(lang, "insufficientData")}</div>;
  return (
    <div style={{ display:"flex", flexDirection:"column", gap:7 }}>
      {rows.map(d => {
        const pct = safePct(d.value, total);
        return (
          <div key={d.id || d.label}>
            <div style={{ display:"grid", gridTemplateColumns:"minmax(0,1fr) auto", gap:8, alignItems:"baseline", fontSize:10, color:"#888", marginBottom:4 }}>
              <span title={d.label} style={{ minWidth:0, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{d.label}</span>
              <span title={pct.toFixed(1)+"% · "+fmtMoney(d.value)} style={{ color:d.color || "#00E1DC", whiteSpace:"nowrap", textAlign:"right", fontVariantNumeric:"tabular-nums" }}>{pct.toFixed(1)}% · {fmtMoney(d.value)}</span>
            </div>

}

function buildPerformanceStory(allLines, exposure, privateMetrics, totalPatrimoine, lang = "fr") {
  const rows = (allLines || []).map(l => ({
    ...l,
    value: getLineCurrentValue(l),
    pnl: getLineCurrentValue(l) - getLinePRUTotal(l),
    pnlPct: safePct(getLineCurrentValue(l) - getLinePRUTotal(l), getLinePRUTotal(l))
  })).filter(l => l.value > 0 || Math.abs(l.pnl) > 0);
  const top = [...rows].sort((a,b)=>b.pnl-a.pnl).slice(0,5);
  const worst = [...rows].sort((a,b)=>a.pnl-b.pnl).slice(0,5);
  const geoLead = (exposure.geography || [])[0];
  const sectorLead = (exposure.sector || [])[0];
  const currencyLead = (exposure.currency || [])[0];
  const notes = [];
  if (geoLead) notes.push(lang === "en" ? `Your portfolio is mainly exposed to ${geoLead.label} (${safePct(geoLead.value,totalPatrimoine).toFixed(0)}%).` : `Votre portefeuille est principalement exposé à ${geoLead.label} (${safePct(geoLead.value,totalPatrimoine).toFixed(0)}%).`);
  if (sectorLead) notes.push(lang === "en" ? `The dominant sector driver is ${sectorLead.label}; monitor it to avoid excessive concentration.` : `Le moteur sectoriel dominant est ${sectorLead.label}, à surveiller pour éviter une concentration excessive.`);
  if (currencyLead && currencyLead.label !== "EUR") notes.push(lang === "en" ? `${currencyLead.label} currency exposure is a source of volatility to document in client reporting.` : `La devise ${currencyLead.label} représente une source de volatilité à documenter dans le reporting client.`);
  if (privateMetrics.value > 0) notes.push(lang === "en" ? `Private assets contribute ${fmtMoney(privateMetrics.value)} of NAV, with an aggregate MOIC of ${privateMetrics.moic.toFixed(2)}x.` : `Les actifs privés apportent ${fmtMoney(privateMetrics.value)} de NAV, avec un MOIC agrégé de ${privateMetrics.moic.toFixed(2)}x.`);
  if (!rows.length) notes.push(lang === "en" ? "Market data is still limited: fill in prices, cost bases and exposures to generate a more complete narrative." : "Les données de marché sont encore limitées : renseignez les prix, PRU et expositions pour générer une narration plus complète.");
  return { top, worst, notes };
}

function buildPortfolioAdvisorOpportunities(type, lineRows, total, lang = "fr") {
  const rows = [];
  const module = type === "pea" ? "PEA" : type === "cto" ? "CTO" : "Assurance Vie";
  const add = (titleFr, titleEn, actionFr, actionEn, color) => rows.push({ module, title: lang === "en" ? titleEn : titleFr, action: lang === "en" ? actionEn : actionFr, color });
  const lines = (lineRows || []).filter(l => safeNum(l.val) > 0);
  if (!lines.length) {
    if (type === "pea") add("PEA non investi", "Uninvested PEA", "Utiliser le PEA comme cœur actions européennes/ETF Monde éligible pour améliorer l'efficacité fiscale long terme.", "Use the PEA as a tax-efficient core for eligible European/global equity ETFs.", "#4a9e6b");
    else if (type === "cto") add("CTO à structurer", "CTO to structure", "Créer une poche internationale complémentaire, notamment US, obligations internationales ou thématiques non éligibles au PEA.", "Build an international sleeve, especially US exposure, global bonds or themes not eligible for the PEA.", "#a8c4e8");
    else add("Assurance-vie à exploiter", "Insurance wrapper opportunity", "Étudier fonds euros, unités de compte diversifiées et clause bénéficiaire pour combiner liquidité, fiscalité et transmission.", "Consider euro funds, diversified units and beneficiary clauses to combine liquidity, tax and estate planning.", "#7a9ec9");
    return rows;
  }
  const agg = (keyFn) => {
    const map = {};
    lines.forEach(l => {
      const intel = l.intelligence || getLineIntelligence(l, type);
      const key = keyFn(l, intel) || "Non classé";
      addAgg(map, key, safeNum(l.val), "#00E1DC");
    });
    return toSeries(map);
  };
  const geos = agg((l, intel) => intel.geography);
  const sectors = agg((l, intel) => intel.sector);
  const currencies = agg((l, intel) => intel.currency);
  const cash = lines.filter(l => /cash|liquid/i.test(String(l.ticker) + " " + String(l.categorie))).reduce((s,l)=>s+safeNum(l.val),0);
  const geoLead = geos[0], sectorLead = sectors[0], usd = currencies.find(c => c.label === "USD"), eur = currencies.find(c => c.label === "EUR");
  if (geoLead && safePct(geoLead.value,total) > 60) add("Concentration géographique", "Geographic concentration", `${safePct(geoLead.value,total).toFixed(0)}% du ${module} est exposé à ${geoLead.label}. Proposer une diversification complémentaire hors ${geoLead.label}, par exemple ETF Monde, fonds US ou mandat global.`, `${safePct(geoLead.value,total).toFixed(0)}% of ${module} is exposed to ${geoLead.label}. Propose complementary diversification outside ${geoLead.label}, such as a global ETF, US fund or global mandate.`, "#00E1DC");
  if (sectorLead && safePct(sectorLead.value,total) > 45) {
    const auto = /auto|automobile|car/i.test(sectorLead.label);
    add("Concentration sectorielle", "Sector concentration", auto ? `Exposition forte à l'automobile. Diversifier vers santé, technologie qualité, infrastructures ou ETF larges pour réduire le risque cyclique.` : `${sectorLead.label} représente ${safePct(sectorLead.value,total).toFixed(0)}% du ${module}. Diversifier vers santé, infrastructure, obligations ou multi-actifs selon profil.`, auto ? "High automotive exposure. Diversify into healthcare, quality technology, infrastructure or broad ETFs to reduce cyclical risk." : `${sectorLead.label} represents ${safePct(sectorLead.value,total).toFixed(0)}% of ${module}. Diversify into healthcare, infrastructure, bonds or multi-asset depending on risk profile.`, "#7a9ec9");
  }
  if (eur && safePct(eur.value,total) > 80 && type !== "pea") add("Biais euro élevé", "High euro bias", "Introduire progressivement une poche USD ou Monde couverte/non couverte selon les besoins futurs du client.", "Gradually introduce a USD or global sleeve, hedged or unhedged depending on future client needs.", "#4a9e6b");
  if (usd && safePct(usd.value,total) > 45) add("Risque devise USD", "USD currency risk", "Documenter l'exposition dollar et proposer des parts couvertes ou une allocation EUR défensive si les dépenses futures sont en euros.", "Document dollar exposure and propose hedged share classes or defensive EUR exposure if future spending is in euros.", "#4a9e6b");
  if (safePct(cash,total) > 20) add("Liquidités à déployer", "Cash to deploy", "La poche cash est élevée. Construire un plan d'investissement progressif ou une poche monétaire rémunérée.", "Cash is elevated. Build a phased investment plan or remunerated money-market sleeve.", "#e8a055");
  if (lines.length < 3 && total > 10000) add("Nombre de lignes limité", "Limited number of holdings", "Ajouter des supports diversifiés pour réduire le risque spécifique d'une ligne unique.", "Add diversified instruments to reduce single-position risk.", "#e8a055");
  if (!rows.length) add("Revue d'allocation", "Allocation review", "Allocation lisible. Préparer une revue autour des objectifs, de la fiscalité et du niveau de risque accepté.", "Readable allocation. Prepare a review around objectives, tax treatment and accepted risk level.", "#00E1DC");
  return rows.slice(0,4);
}

function buildImmoAdvisorOpportunities(biens, totalCapNet, lang = "fr") {
  const rows = [];
  const add = (titleFr, titleEn, actionFr, actionEn, color) => rows.push({ module: "Immobilier", title: lang === "en" ? titleEn : titleFr, action: lang === "en" ? actionEn : actionFr, color });
  const list = Array.isArray(biens) ? biens : [];
  if (!list.length) {
    add("Pas d'immobilier direct", "No direct real estate", "Selon le profil, proposer SCPI, OPCI ou dette immobilière pour diversifier sans gestion opérationnelle directe.", "Depending on the profile, propose SCPI, OPCI or real-estate debt to diversify without direct operational management.", "#a0c4ff");
    return rows;
  }
  const personal = list.filter(b => (b.typeDetention || "personnel") === "personnel").reduce((s,b)=>s+Math.max(0,getBienValeur(b)-getBienDetteRestante(b)),0);
  const locatif = list.filter(b => b.usage === "locatif").reduce((s,b)=>s+Math.max(0,getBienValeur(b)-getBienDetteRestante(b)),0);
  const dette = list.reduce((s,b)=>s+getBienDetteRestante(b),0);
  const valeur = list.reduce((s,b)=>s+getBienValeur(b),0);
  if (safePct(personal,totalCapNet) > 60) add("Détention personnelle dominante", "Personal ownership concentration", "Étudier une SCI, un démembrement ou une stratégie de transmission si le parc immobilier pèse fortement en nom propre.", "Consider an SCI, ownership split or estate-planning strategy if real estate is mostly held personally.", "#a0c4ff");
  if (locatif <= 0) add("Peu d'actifs locatifs", "Limited rental exposure", "Le patrimoine immobilier semble surtout personnel. Étudier locatif, SCPI ou nue-propriété pour créer du rendement et diversifier.", "Real estate seems mostly personal. Consider rental property, SCPI or bare ownership to generate yield and diversify.", "#e8a055");
  if (valeur > 0 && safePct(dette,valeur) > 70) add("Levier immobilier élevé", "High real-estate leverage", "Vérifier sensibilité aux taux, échéancier de dette et besoin de liquidité de sécurité.", "Check interest-rate sensitivity, debt schedule and safety liquidity needs.", "#e05555");
  if (!rows.length) add("Optimisation patrimoniale", "Wealth structuring", "Parc immobilier structuré. Revoir fiscalité, assurance emprunteur, loyers et transmission.", "Structured real-estate portfolio. Review tax, loan insurance, rents and estate planning.", "#00E1DC");
  return rows.slice(0,4);
}

function buildPrivateAdvisorOpportunities(items, metrics, lang = "fr") {
  const rows = [];
  const add = (titleFr, titleEn, actionFr, actionEn, color) => rows.push({ module: lang === "en" ? "Private Markets" : "Private Markets", title: lang === "en" ? titleEn : titleFr, action: lang === "en" ? actionEn : actionFr, color });

  if (!rows.length) add("Reporting non coté", "Private-assets reporting", "Compléter millésime, TRI, MOIC et prochains flux pour rendre le reporting client-grade.", "Complete vintage, IRR, MOIC and future cashflows to make reporting client-grade.", "#00E1DC");

}

function buildIncomeAdvisorOpportunities(lignes, patrimoine, lang = "fr") {
  const rows = [];
  const add = (titleFr, titleEn, actionFr, actionEn, color) => rows.push({ module: lang === "en" ? "Income" : "Revenus", title: lang === "en" ? titleEn : titleFr, action: lang === "en" ? actionEn : actionFr, color });
  const ann = l => safeNum(l.montant) * ({ mensuel:12, trimestriel:4, annuel:1, ponctuel:0 }[l.frequence] ?? 1);
  const total = (lignes || []).reduce((s,l)=>s+ann(l),0);
  if (!lignes || !lignes.length) add("Revenus non documentés", "Income not documented", "Renseigner salaires, loyers, dividendes et intérêts pour produire une projection de cash-flow client.", "Enter salary, rents, dividends and interest to produce a client cash-flow projection.", "#e8a055");
  else if (safePct(total, patrimoine) < 2) add("Faible rendement de revenus", "Low income yield", "Étudier une poche génératrice de revenus : fonds euros, obligations court terme, SCPI ou dividendes de qualité.", "Consider income-generating exposure: euro funds, short-duration bonds, SCPI or quality dividends.", "#4a9e6b");
  else add("Revenus à sécuriser", "Secure recurring income", "Formaliser la récurrence des revenus et distinguer revenus garantis, variables et fiscalisés.", "Formalize income recurrence and separate guaranteed, variable and taxable income.", "#00E1DC");
  return rows.slice(0,3);
}

function DashboardModule({ peaTotal, ctoTotal, avTotal, immoCapNet, privateTotal, totalPatrimoine, revenusAnnuels, immoBiens, apiKey, lang = "fr", reportMode = "advisor" }) {
  const [analysis, setAnalysis] = React.useState("");
  const [analyzing, setAnalyzing] = React.useState(false);
  const [snapshots, setSnapshots] = React.useState(function() {
    try { return JSON.parse(localStorage.getItem("mpb_snapshots") || "[]"); } catch { return []; }
  });

  React.useEffect(function() {
    if (totalPatrimoine <= 0) return;
    var today = new Date().toISOString().split("T")[0];
    var existing = snapshots.find(function(s){ return s.date === today; });
    if (!existing) {
      var newSnap = { date: today, pea: peaTotal, cto: ctoTotal, av: avTotal, immo: immoCapNet, private: privateTotal, total: totalPatrimoine };
      var updated = snapshots.slice(-364).concat([newSnap]);
      localStorage.setItem("mpb_snapshots", JSON.stringify(updated));
      setSnapshots(updated);
    }
  }, [totalPatrimoine]);

  var peaLines = React.useMemo(function(){ try { return JSON.parse(localStorage.getItem("pea_lines")||"[]"); } catch { return []; } }, []);
  var ctoLines = React.useMemo(function(){ try { return JSON.parse(localStorage.getItem("cto_lines")||"[]"); } catch { return []; } }, []);
  var avLines  = React.useMemo(function(){ try { return JSON.parse(localStorage.getItem("av_lines") ||"[]"); } catch { return []; } }, []);
  var revenus  = React.useMemo(function(){ try { return JSON.parse(localStorage.getItem("mpb_revenus")||"[]"); } catch { return []; } }, []);
  var privateItems = React.useMemo(function(){ return readJson("private_markets", []); }, []);
  var privateMetrics = calcPrivateMetrics(privateItems);
  var allLines = peaLines.map(l => ({...l, wrapper:"PEA"})).concat(ctoLines.map(l => ({...l, wrapper:"CTO"}))).concat(avLines.map(l => ({...l, wrapper:"AV"})));

  var modules = [
    { id:"pea",  label:"PEA",         value: peaTotal,   color:"#4a9e6b" },
    { id:"cto",  label:"CTO",         value: ctoTotal,   color:"#a8c4e8" },
    { id:"av",   label:"AV",          value: avTotal,    color:"#7a9ec9" },
    { id:"immo", label:"Immobilier",  value: immoCapNet, color:"#a0c4ff" },
	    { id:"private", label:tr(lang, "privateLabel"), value: privateTotal, color:"#9a8ec9" },
  ].filter(function(m){ return m.value > 0; });

  var catMap = {};
  allLines.forEach(function(l) {
    var v = getLineCurrentValue(l);
    if (!catMap[l.categorie]) catMap[l.categorie] = { value:0, color: CAT_COLORS[l.categorie] || "#888" };
    catMap[l.categorie].value += v;
  });
  if (immoCapNet > 0) catMap["Immobilier"] = { value: immoCapNet, color: "#a0c4ff" };
  if (privateTotal > 0) catMap["Private Markets"] = { value: privateTotal, color: "#9a8ec9" };
  var cats = Object.keys(catMap).map(function(k){ return { id:k, label:k, value:catMap[k].value, color:catMap[k].color }; }).filter(function(c){ return c.value > 0; }).sort(function(a,b){ return b.value-a.value; });
  var assetClassMap = {};
  allLines.forEach(function(l) {
    var v = getLineCurrentValue(l), cat = String(l.categorie || "");
	    var label = cat === "Cash" || l.ticker === "CASH" ? tr(lang, "cash") : (l.wrapper === "AV" ? tr(lang, "insuranceWrappers") : tr(lang, "listedEquities"));
	    addAgg(assetClassMap, label, v, label === tr(lang, "cash") ? "#8b9e4a" : label === tr(lang, "insuranceWrappers") ? "#7a9ec9" : "#4a9e6b");
	  });
	  addAgg(assetClassMap, tr(lang, "realEstate"), immoCapNet, "#a0c4ff");
	  addAgg(assetClassMap, tr(lang, "privateAssets"), privateTotal, "#9a8ec9");
  var assetClasses = toSeries(assetClassMap);
  var incomeGeneratingAssets = allLines.filter(function(l){ return /dividend|dividendes|fonds euros|coupon|oblig/i.test(String(l.categorie)+" "+String(l.nom)); }).reduce(function(s,l){ return s + getLineCurrentValue(l); }, 0) + immoBiens.filter(function(b){ return safeNum(b.loyerMensuelHC) > 0; }).reduce(function(s,b){ return s + Math.max(0, getBienValeur(b) - getBienDetteRestante(b)); }, 0) + privateItems.filter(function(i){ return safeNum(i.distributions) > 0; }).reduce(function(s,i){ return s + safeNum(i.nav); }, 0);
  var exposureMaps = { geography:{}, sector:{}, currency:{} };
  allLines.forEach(function(l) {
    var v = getLineCurrentValue(l);
    var intel = getLineIntelligence(l, l.wrapper === "PEA" ? "pea" : l.wrapper === "CTO" ? "cto" : "av");
    addAgg(exposureMaps.geography, intel.geography, v, "#00E1DC");
    addAgg(exposureMaps.sector, intel.sector, v, "#7a9ec9");
